<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upcoming Tasks</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
            scroll-behavior: smooth;
        }

        .menu-global {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 22px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1500;
            padding: 8px 10px;
            border-radius: 8px;
        }

        .menu-global:hover {
            background: #f5f5f5;
        }

        .page-content {
            flex: 1;
            padding: 30px;
            padding-left: 70px;
            width: 100%;
            box-sizing: border-box;
        }

        .container {
            width: 760px;
            max-width: calc(100% - 20px);
            margin: 70px auto 50px;
        }

        .page-title {
            font-size: 36px;
            text-align: center;
            margin-bottom: 10px;
        }

        .month-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .month-label {
            text-align: center;
            color: gray;
            font-size: 18px;
        }

        .nav-arrow {
            text-decoration: none;
            color: black;
            font-size: 22px;
            padding: 6px 10px;
            border-radius: 8px;
        }

        .nav-arrow:hover {
            background: #f2f2f2;
        }

        .nav-arrow.disabled {
            color: #bdbdbd;
            pointer-events: none;
            cursor: not-allowed;
        }

        .days-bar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }

        .day-box {
            text-align: center;
            padding: 10px 6px;
            border-radius: 10px;
            text-decoration: none;
            color: black;
            border: 1px solid #ddd;
            background: white;
            box-sizing: border-box;
            width: 100%;
        }

        .day-box:hover {
            background: #f7f7f7;
        }

        .day-box.active {
            background: black;
            color: white;
            border: 1px solid black;
        }

        .day-name {
            font-size: 11px;
        }

        .day-number {
            font-size: 16px;
            font-weight: bold;
        }

        .day-section {
            scroll-margin-top: 20px;
        }

        .day-title {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .section-line {
            margin: 22px 0;
            border: none;
            border-top: 1px solid #ddd;
        }

        .empty-text {
            color: gray;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .quick-add-box,
        .inline-edit-box {
            border: 1px solid #e5e5e5;
            border-radius: 14px;
            background: #fff;
            padding: 12px 14px;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .quick-add-box {
            border: none;
            border-bottom: 1px solid #e5e5e5;
            border-radius: 0;
            background: transparent;
            padding: 6px 0;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }
        .quick-add-box.expanded {
            border: 1px solid #e5e5e5;
            border-radius: 14px;
            padding: 12px 14px;
            background: #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }
        .quick-add-box.collapsed {
            padding: 8px 14px;
        }

        .quick-add-box.collapsed .quick-add-description-wrap {
            display: none !important;
        }

        .quick-add-box.collapsed .quick-add-actions {
            display: none;
        }

        .quick-add-box.collapsed .quick-add-title {
            font-size: 15px;
            padding: 2px 0;
        }

        .quick-add-box.expanded .quick-add-actions {
            display: flex;
        }

        .quick-add-box.expanded .quick-add-description-wrap {
            display: block;
        }

        .quick-add-box:focus-within,
        .inline-edit-box:focus-within {
            border-color: #cfcfcf;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }

        .quick-add-top,
        .inline-edit-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quick-add-title,
        .inline-edit-title {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
            color: #111;
            padding: 6px 0;
            font-family: Arial, sans-serif;
        }

        .quick-add-title::placeholder,
        .inline-edit-title::placeholder {
            color: #888;
        }

        .quick-add-actions,
        .inline-edit-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-add-description-wrap,
        .inline-edit-description-wrap {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }

        .quick-add-description-wrap {
            display: none;
        }

        .quick-add-box.expanded .quick-add-description-wrap {
            display: block;
        }

        .quick-add-description,
        .inline-edit-description {
            width: 100%;
            min-height: 44px;
            resize: vertical;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            line-height: 1.5;
            color: #444;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .quick-add-description::placeholder,
        .inline-edit-description::placeholder {
            color: #9a9a9a;
        }

        .hint-text {
            margin-top: 8px;
            font-size: 12px;
            color: #8a8a8a;
        }

        .task-item {
            padding: 14px 0;
            border-bottom: 1px solid #e6e6e6;
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            width: 100%;
        }

        .task-left {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .task-content {
            flex: 1;
            min-width: 0;
            max-width: 520px;
        }

        .task-title {
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 16px;
            line-height: 1.4;
        }

        .task-title.done {
            color: gray;
        }

        .task-title.active {
            font-weight: bold;
            color: #111;
        }

        .task-desc {
            margin-top: 5px;
            line-height: 1.5;
            color: #444;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 14px;
        }

        .task-desc.done {
            color: gray;
        }

        .task-meta-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .priority-label,
        .category-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .priority-label {
            color: #555;
        }

        .category-label {
            color: #888;
        }

        .priority-dot,
        .category-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .task-date {
            font-size: 13px;
            color: #555;
        }

        .task-date.done {
            color: gray;
        }

        .task-checkbox {
            margin-top: 2px;
            width: 17px;
            height: 17px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .desc-short,
        .desc-full {
            display: inline;
        }

        .desc-full {
            display: none;
        }

        .more-btn {
            color: #666;
            cursor: pointer;
            font-size: 13px;
            margin-left: 6px;
            text-decoration: underline;
        }

        .more-btn:hover {
            color: black;
        }

        .task-actions {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
            align-items: flex-start;
            white-space: nowrap;
            padding-top: 2px;
        }

        .task-actions a,
        .task-actions button {
            text-decoration: none;
            font-size: 15px;
            color: black;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
        }

        .task-actions a:hover,
        .task-actions button:hover {
            opacity: 0.75;
        }

        .icon-btn,
        .smart-pill {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #e1e1e1;
            background: #fafafa;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s ease;
            overflow: hidden;
            padding: 0;
        }

        .icon-btn:hover,
        .smart-pill:hover {
            background: #f2f2f2;
        }

        .icon-btn i,
        .smart-pill i {
            font-size: 14px;
            color: #555;
            pointer-events: none;
            flex-shrink: 0;
        }

        .smart-pill .pill-text {
            display: none;
            font-size: 13px;
            color: #444;
            white-space: nowrap;
        }

        .smart-pill.active {
            width: auto;
            min-width: 36px;
            border-radius: 999px;
            justify-content: flex-start;
            padding: 0 12px;
        }

        .smart-pill.active .pill-text {
            display: inline;
        }

        .hidden-flatpickr-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }

        .smart-pill select,
        .smart-pill input {
            position: absolute;
            inset: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            border: none;
        }

        .inline-edit-box {
            display: none;
            width: 100%;
        }

        .inline-edit-box.active {
            display: block;
        }

        .inline-edit-save-row {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
        }

        .small-save-btn {
            border: none;
            background: black;
            color: white;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
        }

        #sidebar a {
            text-decoration: none;
            color: black;
        }

        #sidebar a:hover {
            text-decoration: underline;
        }

        .flatpickr-calendar {
            border: none !important;
            border-radius: 18px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12) !important;
            padding: 10px !important;
            width: 360px !important;
            max-width: 90vw !important;
            font-family: Arial, sans-serif !important;
        }

        .flatpickr-current-month {
            font-size: 16px !important;
            padding-top: 4px !important;
        }

        .flatpickr-current-month .flatpickr-monthDropdown-months,
        .flatpickr-current-month input.cur-year {
            font-size: 16px !important;
            font-weight: 600 !important;
        }

        span.flatpickr-weekday {
            color: #555 !important;
            font-size: 12px !important;
            font-weight: 600 !important;
        }

        .flatpickr-day {
            border-radius: 999px !important;
            font-size: 14px !important;
            height: 42px !important;
            line-height: 42px !important;
            max-width: 42px !important;
        }

        .flatpickr-day.today {
            border: 1px solid #999 !important;
        }

        .flatpickr-day.selected {
            background: #111 !important;
            border-color: #111 !important;
            color: #fff !important;
        }

        .flatpickr-day:hover {
            background: #f2f2f2 !important;
        }

        .flatpickr-prev-month,
        .flatpickr-next-month {
            top: 12px !important;
        }

        @media (max-width: 720px) {
            .quick-add-top,
            .inline-edit-top {
                flex-direction: column;
                align-items: stretch;
            }

            .quick-add-actions,
            .inline-edit-actions {
                justify-content: flex-start;
            }

            .container {
                max-width: 100%;
            }

            .flatpickr-calendar {
                width: 95vw !important;
            }
        }
        .day-card {
            border: 1px solid #e5e5e5;
            border-radius: 18px;
            background: #fff;
            padding: 18px 18px 8px;
            margin-bottom: 22px;
        }

        .day-card .day-title {
            margin-top: 0;
            margin-bottom: 14px;
        }

        .day-card .quick-add-box {
            margin-top: 0;
        }

        .day-card .task-item:last-child {
            border-bottom: none;
        }

        .day-card .empty-text {
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .day-card .section-line {
            display: none;
        }


/* ===== UPCOMING PAGE - MATCH ALL TASKS THEME ===== */
:root {
    --primary-50: #e4ecf6;
    --primary-100: #bad0ee;
    --primary-600: #1d4ed8;
    --primary-700: #003e8f;
    --primary-800: #00285c;
    --primary-900: #001229;
    --secondary-50: #ecf1f9;
    --secondary-100: #d6e3f5;
    --secondary-800: #1e5b96;
    --bg: #f5f8ff;
    --text: #08213f;
    --muted: #64748b;
    --soft-blue: #55b6e8;
    --shadow-card: 0 8px 22px rgba(12, 108, 233, 0.06);
}
* { box-sizing: border-box; }
html, body { min-height: 100%; overflow-x: hidden; overflow-y: auto; background: var(--bg) !important; color: var(--text); }
body { min-height: 100vh; }
.menu-global { top: 20px !important; left: 20px !important; width: 46px !important; height: 46px !important; font-size: 20px !important; background: #ffffff !important; color: #2563eb !important; border: 1px solid #dbeafe !important; border-radius: 14px !important; padding: 0 !important; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08) !important; z-index: 2000 !important; transition: 0.2s ease; }
.menu-global:hover { background: var(--primary-50) !important; transform: translateY(-1px); }
.page-content { width: 100% !important; min-height: 100vh; padding: 10px 34px 34px 78px !important; display: flex; justify-content: center; background: var(--bg) !important; transition: 0.3s ease; }
body.sidebar-open .page-content { padding-left: 260px !important; }
.container { width: 100% !important; max-width: 1120px !important; margin: 0 auto !important; }
.page-title { text-align: left !important; margin: 8px 0 10px 7px !important; font-size: 32px !important; line-height: 1 !important; letter-spacing: -0.5px; color: var(--primary-900) !important; }
.month-row { justify-content: space-between !important; gap: 14px !important; margin: 10px 0 14px !important; padding: 14px 18px; background: #ffffff; border: 1px solid #dbeafe; border-radius: 18px; box-shadow: var(--shadow-card); }
.month-label { color: var(--primary-900) !important; font-size: 18px !important; font-weight: 800; }
.nav-arrow { color: var(--primary-700) !important; background: #eef6ff; border: 1px solid rgba(12, 108, 233, 0.12); border-radius: 14px !important; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; padding: 0 !important; transition: 0.2s ease; }
.nav-arrow:hover { background: #dbeafe !important; transform: translateY(-1px); }
.nav-arrow.disabled { background: #f1f5f9 !important; color: #94a3b8 !important; border-color: #e2e8f0; }
.days-bar { gap: 10px !important; margin-bottom: 18px !important; }
.day-box { border: 1px solid #dbeafe !important; background: #ffffff !important; color: var(--primary-800) !important; border-radius: 18px !important; padding: 12px 8px !important; box-shadow: var(--shadow-card); transition: 0.2s ease; }
.day-box:hover { background: var(--primary-50) !important; transform: translateY(-1px); }
.day-box.active { background: #cbe2ff !important; color: var(--primary-900) !important; border-color: #93c5fd !important; }
.day-name { font-size: 11px !important; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
.day-box.active .day-name { color: var(--primary-700); }
.day-number { margin-top: 3px; font-size: 18px !important; font-weight: 900 !important; }
.day-card { border: 1px solid #dbeafe !important; border-left: 5px solid var(--soft-blue) !important; border-radius: 18px !important; background: #ffffff !important; padding: 16px 18px 12px !important; margin-bottom: 16px !important; box-shadow: var(--shadow-card) !important; overflow: hidden; }
.day-title { margin: 0 0 12px !important; color: var(--primary-900) !important; font-size: 18px !important; font-weight: 850 !important; }
.quick-add-box, .inline-edit-box { border: 1px solid rgba(12, 108, 233, 0.14) !important; border-radius: 18px !important; background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%) !important; padding: 12px 14px !important; box-shadow: 0 8px 22px rgba(12, 108, 233, 0.05); }
.quick-add-box { margin-bottom: 12px !important; }
.quick-add-box.collapsed { padding: 10px 14px !important; box-shadow: none; background: #f8fbff !important; }
.quick-add-box:focus-within, .inline-edit-box:focus-within { border-color: #93c5fd !important; box-shadow: 0 10px 28px rgba(12, 108, 233, 0.10) !important; }
.quick-add-title, .inline-edit-title { color: var(--primary-900) !important; font-weight: 650; }
.quick-add-title::placeholder, .inline-edit-title::placeholder { color: #8aa0bd !important; }
.quick-add-description-wrap, .inline-edit-description-wrap { border-top: 1px solid rgba(12, 108, 233, 0.12) !important; }
.quick-add-description, .inline-edit-description { color: var(--muted) !important; line-height: 1.6 !important; }
.hint-text { color: var(--primary-600) !important; }
.task-item { width: 100%; padding: 8px 18px !important; margin-bottom: 10px; border: 1px solid #dbeafe !important; border-left: none !important; border-radius: 18px; background: #ffffff; box-shadow: var(--shadow-card); transition: 0.18s ease; }
.task-item:hover { border-color: #bfdbfe !important; box-shadow: 0 12px 26px rgba(12, 108, 233, 0.08); }
.task-row { align-items: center !important; }
.task-left { align-items: center !important; gap: 14px !important; }
.task-content { max-width: 680px !important; }
.task-title { font-size: 16px !important; line-height: 1.45 !important; font-weight: 600 !important; color: #0f172a !important; }
.task-title.done { color: #94a3b8 !important; text-decoration: line-through; }
.task-title.active { color: var(--primary-900) !important; font-weight: 550 !important; }
.task-desc { margin-top: 6px !important; line-height: 1.55 !important; color: var(--muted) !important; }
.task-desc.done { color: #9aa8ba !important; }
.task-meta-row { gap: 10px !important; margin-top: 11px !important; }
.priority-label, .category-label, .task-date { display: inline-flex !important; align-items: center; gap: 7px !important; font-size: 13px !important; color: #155e9f !important; background: #eaf7ff; border: 1px solid rgba(85, 182, 232, 0.25); padding: 5px 10px; border-radius: 999px; }
.category-label { background: var(--secondary-50) !important; color: var(--secondary-800) !important; }
.priority-dot, .category-dot { width: 9px !important; height: 9px !important; box-shadow: 0 0 0 3px rgba(12, 108, 233, 0.10); }
.task-date.done { color: #94a3b8 !important; background: #f1f5f9 !important; }
.task-checkbox { width: 20px !important; height: 20px !important; margin-top: 0 !important; accent-color: var(--soft-blue); }
.task-actions { align-items: center !important; gap: 10px !important; opacity: 0; transition: 0.2s ease; }
.task-item:hover .task-actions { opacity: 1; }
.task-actions a, .task-actions button { color: var(--primary-700) !important; padding: 4px !important; }
.task-actions a:hover, .task-actions button:hover { color: var(--primary-600) !important; opacity: 1 !important; }
.smart-pill, .icon-btn { width: 38px !important; height: 38px !important; border-radius: 999px !important; border: 1px solid rgba(12, 108, 233, 0.15) !important; background: linear-gradient(135deg, #ffffff, var(--primary-50)) !important; box-shadow: 0 8px 18px rgba(0, 62, 143, 0.08); }
.smart-pill:hover, .icon-btn:hover { background: linear-gradient(135deg, var(--primary-50), var(--secondary-100)) !important; transform: translateY(-1px); }
.smart-pill i, .icon-btn i { color: var(--primary-700) !important; }
.smart-pill.active { width: auto !important; min-width: 38px !important; padding: 0 13px !important; background: #eef2ff !important; border: none !important; }
.smart-pill.active i, .smart-pill.active .pill-text { color: #4f46e5 !important; font-weight: 700; }
.small-save-btn { background: #6366f1 !important; color: #ffffff !important; border-radius: 14px !important; padding: 10px 18px !important; font-weight: 800; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.22); }
.small-save-btn:hover { background: #4f46e5 !important; }
.empty-text { color: #64748b !important; background: #f8fbff; border: 1px dashed #bfdbfe; border-radius: 16px; padding: 12px 14px; margin: 6px 0 2px !important; font-weight: 600; }
#sidebar { width: 200px !important; min-height: 100vh !important; padding: 90px 16px 20px !important; box-sizing: border-box !important; position: fixed !important; top: 0 !important; left: 0 !important; transform: translateX(-200px) !important; transition: transform 0.28s ease !important; z-index: 1200 !important; background: #cbe2ff !important; border-right: 1px solid rgba(0,0,0,0.05) !important; }
body.sidebar-open #sidebar { transform: translateX(0) !important; }
.sidebar-label { margin: 20px 10px 10px; color: #475569; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
#sidebar a { display: flex !important; align-items: center; gap: 12px; text-decoration: none !important; color: #1e293b !important; font-size: 15px !important; font-weight: 600; padding: 10px 12px !important; border-radius: 14px; margin-bottom: 6px !important; transition: 0.2s ease; }
#sidebar a i { width: 20px; text-align: center; color: #2563eb; }
#sidebar a:hover { background: rgba(255,255,255,0.7) !important; box-shadow: 0 6px 18px rgba(0,0,0,0.06); color: #2563eb !important; text-decoration: none !important; }
#overlay { display: none !important; }
.flatpickr-calendar { border: none !important; border-radius: 18px !important; box-shadow: 0 10px 30px rgba(0, 62, 143, 0.14) !important; }
.flatpickr-day.selected { background: #2563eb !important; border-color: #2563eb !important; }
@media (max-width: 900px) {
    .page-content, body.sidebar-open .page-content { padding: 78px 14px 24px !important; }
    .page-title { font-size: 28px !important; }
    .days-bar { display: flex !important; overflow-x: auto; padding-bottom: 6px; }
    .day-box { min-width: 76px; }
    .month-row { padding: 12px; }
    .task-actions { opacity: 1; }
}

/* Same custom priority/category menus as All Tasks quick-add */
.quick-add-box,
.quick-add-top,
.quick-add-actions { overflow: visible !important; }
.custom-menu-pill { position: relative; width: 38px; height: 38px; flex-shrink: 0; }
.custom-menu-btn { width: 38px; height: 38px; border-radius: 999px; border: 1px solid rgba(12, 108, 233, 0.15); background: linear-gradient(135deg, #ffffff, var(--primary-50)); color: var(--primary-700); display: flex; align-items: center; justify-content: center; padding: 0; cursor: pointer; box-shadow: 0 8px 18px rgba(0, 62, 143, 0.08); transition: 0.2s ease; }
.custom-menu-btn:hover { background: linear-gradient(135deg, var(--primary-50), var(--secondary-100)); transform: translateY(-1px); }
.custom-menu-btn i { pointer-events: none; }
.custom-menu-list { display: none; position: absolute; top: 46px; right: 0; width: 170px; background: #ffffff; border: 1px solid #dbeafe; border-radius: 18px; padding: 8px; box-shadow: 0 18px 45px rgba(0, 62, 143, 0.18); z-index: 99999; }
.custom-menu-pill.open { z-index: 999999 !important; }
.custom-menu-pill.open .custom-menu-list { display: block; z-index: 999999 !important; }
.custom-menu-list div { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 14px; cursor: pointer; font-weight: 700; color: #0f172a; }
.custom-menu-list div:hover { background: #f1f5ff; }
.priority-menu .custom-menu-list { width: 120px; }
.priority-menu .custom-menu-list div { width: 100%; justify-content: flex-start; gap: 8px; padding-left: 10px; padding-right: 10px; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.p1 { background: #ef4444; } .p2 { background: #f97316; } .p3 { background: #eab308; } .p4 { background: #6b7280; }
.work { background: #4a90e2; } .study { background: #9b59b6; } .personal { background: #ff6fa5; } .shopping { background: #2ecc71; }
.custom-menu-pill[data-value="P1"] .custom-menu-btn i { color: #ef4444; }
.custom-menu-pill[data-value="P2"] .custom-menu-btn i { color: #f97316; }
.custom-menu-pill[data-value="P3"] .custom-menu-btn i { color: #eab308; }
.custom-menu-pill[data-value="P4"] .custom-menu-btn i { color: #6b7280; }
.custom-menu-pill[data-value="Work"] .custom-menu-btn i { color: #4a90e2; }
.custom-menu-pill[data-value="Study"] .custom-menu-btn i { color: #9b59b6; }
.custom-menu-pill[data-value="Personal"] .custom-menu-btn i { color: #ff6fa5; }
.custom-menu-pill[data-value="Shopping"] .custom-menu-btn i { color: #2ecc71; }


/* ===== TASK META PILLS COLOR DESIGN ONLY ===== */
.task-meta-row {
    gap: 8px !important;
}

.task-meta-row .priority-label,
.task-meta-row .category-label,
.task-meta-row .task-date {
    display: inline-flex !important;
    align-items: center !important;
    gap: 5px !important;
    padding: 3px 7px !important;
    border-radius: 999px !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    line-height: 1 !important;
    border: 1px solid transparent !important;
    box-shadow: 0 4px 10px rgba(15, 23, 42, 0.035) !important;
}

.task-meta-row .priority-label {
    background: #ffecef !important;
    border-color: #ffd5dc !important;
    color: #7f4a65 !important;
}

.task-meta-row .category-label {
    background: #eaf4ff !important;
    border-color: #d6eaff !important;
    color: #155e9f !important;
}

.task-meta-row .category-label:has(.category-dot[style*="#9b59b6"]),
.task-meta-row .category-label:has(.category-dot[style*="ff6fa5"]) {
    background: #fff0fb !important;
    border-color: #ffd8f2 !important;
    color: #7a4f84 !important;
}

.task-meta-row .category-label:has(.category-dot[style*="#2ecc71"]) {
    background: #edfff6 !important;
    border-color: #d4f8e6 !important;
    color: #176b43 !important;
}

.task-meta-row .task-date {
    background: #eaf4ff !important;
    border-color: #d6eaff !important;
    color: #155e9f !important;
}

.task-meta-row .priority-dot,
.task-meta-row .category-dot {
    width: 6px !important;
    height: 6px !important;
    box-shadow: 0 3px 7px rgba(15, 23, 42, 0.10) !important;
}

.task-meta-row .task-date i {
    font-size: 11px !important;
}

    </style>
</head>
<body>

<button type="button" class="menu-global" onclick="document.body.classList.toggle('sidebar-open')">
    <i class="fa-solid fa-bars"></i>
</button>

<div style="display:flex; min-height:100vh; position:relative;">

    <div id="sidebar">

        <div class="sidebar-label">Menu</div>

        <a href="/today"><i class="fa-solid fa-calendar-day"></i> Today</a>
        <a href="/tasks"><i class="fa-solid fa-list"></i> All Tasks</a>
        <a href="/upcoming"><i class="fa-solid fa-calendar"></i> Upcoming</a>

        <div class="sidebar-label">Organize</div>

        <a href="/categories"><i class="fa-solid fa-layer-group"></i> Categories</a>
        <a href="/priorities"><i class="fa-solid fa-filter"></i> Priorities</a>
        <a href="/notes"><i class="fa-solid fa-note-sticky"></i> Notes</a>
        <a href="/shopping"><i class="fa-solid fa-cart-shopping"></i> Shopping</a>

    </div>

    <div id="overlay"
         onclick="toggleSidebar()"
         style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.2); z-index:2000;"></div>

    <div class="page-content">
        <div class="container">

            <h1 class="page-title">Upcoming</h1>

            <div class="month-row">
                <a th:class="${currentStartDate.equals(today)} ? 'nav-arrow disabled' : 'nav-arrow'"
                   th:href="@{/upcoming(startDate=${prevWeekStart})}">
                    <i class="fa-solid fa-chevron-left"></i>
                </a>

                <div class="month-label" th:text="${monthLabel}"></div>

                <a class="nav-arrow"
                   th:href="@{/upcoming(startDate=${nextWeekStart})}">
                    <i class="fa-solid fa-chevron-right"></i>
                </a>
            </div>

            <div class="days-bar">
                <a th:each="date, stat : ${weekDates}"
                   th:href="'#day-' + ${weekDates[stat.index]}"
                   th:class="${date.equals(today)} ? 'day-box active' : 'day-box'">
                    <div class="day-name"
                         th:text="${#temporals.format(date, 'EEE', T(java.util.Locale).ENGLISH)}">
                    </div>
                    <div class="day-number" th:text="${#temporals.format(date, 'd')}"></div>
                </a>
            </div>

            <div th:each="entry, stat : ${groupedTasks}"
                 th:id="'day-' + ${weekDates[stat.index]}"
                 class="day-section day-card">

                <div th:text="${entry.key}" class="day-title"></div>

                <form th:action="@{/tasks}"
                      th:object="${task}"
                      method="post"
                      class="quick-add-box day-quick-add collapsed">

                    <input type="hidden" name="source" value="upcoming">
                    <input type="hidden" name="startDate" th:value="${currentStartDate}">
                    <input type="hidden" name="targetDate" th:value="${weekDates[stat.index]}">

                    <div class="quick-add-top">
                        <input type="text"
                               th:field="*{title}"
                               placeholder="Add a task..."
                               class="quick-add-title"
                               autocomplete="off"
                               required>

                        <div class="quick-add-actions">
                            <div class="smart-pill date-pill">
                                <i class="fa-regular fa-calendar"></i>
                                <span class="pill-text"></span>
                                <input type="text"
                                       name="dueDate"
                                       th:value="${weekDates[stat.index]}"
                                       class="hidden-flatpickr-input day-date-input"
                                       readonly>
                            </div>

                            <div class="custom-menu-pill priority-menu priority-pill">
                                <button type="button" class="custom-menu-btn" onclick="toggleCustomMenu(event, this)">
                                    <i class="fa-solid fa-flag"></i>
                                </button>

                                <input type="hidden" th:field="*{priority}" class="day-priority-input" value="">

                                <div class="custom-menu-list">
                                    <div onclick="chooseCustomOption(event, this, 'P1')"><span class="dot p1"></span>P1</div>
                                    <div onclick="chooseCustomOption(event, this, 'P2')"><span class="dot p2"></span>P2</div>
                                    <div onclick="chooseCustomOption(event, this, 'P3')"><span class="dot p3"></span>P3</div>
                                    <div onclick="chooseCustomOption(event, this, 'P4')"><span class="dot p4"></span>P4</div>
                                </div>
                            </div>

                            <div class="custom-menu-pill category-menu category-pill">
                                <button type="button" class="custom-menu-btn" onclick="toggleCustomMenu(event, this)">
                                    <i class="fa-solid fa-tag"></i>
                                </button>

                                <input type="hidden" th:field="*{category}" class="day-category-input" value="">

                                <div class="custom-menu-list">
                                    <div onclick="chooseCustomOption(event, this, 'Work')"><span class="dot work"></span>Work</div>
                                    <div onclick="chooseCustomOption(event, this, 'Study')"><span class="dot study"></span>Study</div>
                                    <div onclick="chooseCustomOption(event, this, 'Personal')"><span class="dot personal"></span>Personal</div>
                                    <div onclick="chooseCustomOption(event, this, 'Shopping')"><span class="dot shopping"></span>Shopping</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="quick-add-description-wrap">
                        <textarea th:field="*{description}"
                                  placeholder="Description..."
                                  class="quick-add-description"></textarea>

                    </div>
                </form>

                <div th:if="${!#lists.isEmpty(entry.value)}">
                    <div th:each="task : ${entry.value}" class="task-item">

                        <div class="task-row" th:id="'taskView-' + ${task.id}">
                            <div class="task-left">
                                <form th:action="@{/tasks/toggle/{id}(id=${task.id})}" method="post" style="margin:0;">
                                    <input type="hidden" name="source" value="upcoming">
                                    <input type="hidden" name="startDate" th:value="${currentStartDate}">
                                    <input type="hidden" name="targetDate" th:value="${weekDates[stat.index]}">
                                    <input type="checkbox"
                                           class="task-checkbox"
                                           th:checked="${task.done}"
                                           onchange="this.form.submit()">
                                </form>

                                <div class="task-content">
                                    <div th:class="${task.done} ? 'task-title done' : 'task-title active'"
                                         th:text="${task.title}"></div>

                                    <div th:if="${task.description != null and !#strings.isEmpty(task.description)}"
                                         th:class="${task.done} ? 'task-desc done' : 'task-desc'">

                                        <span th:if="${task.description.length() > 90}">
                                            <span class="desc-short"
                                                  th:text="${task.description.substring(0,90)}"></span>...
                                            <span class="more-btn" onclick="toggleDesc(this)">More</span>
                                            <span class="desc-full"
                                                  th:text="${task.description}"></span>
                                        </span>

                                        <span th:if="${task.description.length() <= 90}"
                                              th:text="${task.description}">
                                        </span>
                                    </div>

                                    <div class="task-meta-row">
                                        <div class="priority-label" th:if="${task.priority != null}">
                                            <span class="priority-dot"
                                                  th:style="${
                                                      task.priority == 'P1' ? 'background:red;' :
                                                      (task.priority == 'P2' ? 'background:#ff8800;' :
                                                      (task.priority == 'P3' ? 'background:#f4f128;' :
                                                          'background:gray;'))
                                                  }">
                                            </span>
                                            <span th:text="${task.priority}"></span>
                                        </div>

                                        <div class="category-label" th:if="${task.category != null and !#strings.isEmpty(task.category)}">
                                            <span class="category-dot"
                                                  th:style="${
                                                      task.category == 'Work' ? 'background:#4a90e2;' :
                                                      (task.category == 'Study' ? 'background:#9b59b6;' :
                                                      (task.category == 'Personal' ? 'background:#ff6fa5;' :
                                                      (task.category == 'Shopping' ? 'background:#2ecc71;' :
                                                      'background:#cfcfcf;')))
                                                  }">
                                            </span>
                                            <span th:text="${task.category}"></span>
                                        </div>

                                        <div th:if="${task.dueDate != null}"
                                             th:class="${task.done} ? 'task-date done' : 'task-date'">
                                            <i class="fa-regular fa-calendar"></i>
                                            <span th:text="${task.formattedDueDate}"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="task-actions">
                                <button type="button"
                                        th:style="${task.done} ? 'color:gray; pointer-events:none; cursor:not-allowed;' : 'color:black;'"
                                        th:onclick="'toggleEditInline(' + ${task.id} + ')'">
                                    <i class="fa-solid fa-pen"></i>
                                </button>

                                <a th:href="@{/tasks/delete/{id}(id=${task.id}, priority='Upcoming', source='upcoming', startDate=${currentStartDate})}">
                                    <i class="fa-solid fa-xmark"></i>
                                </a>
                            </div>
                        </div>

                        <div th:id="'taskEdit-' + ${task.id}" class="inline-edit-box">
                            <form th:action="@{/tasks/update/{id}(id=${task.id})}" method="post">
                                <input type="hidden" name="source" value="upcoming">
                                <input type="hidden" name="startDate" th:value="${currentStartDate}">
                                <input type="hidden" name="targetDate" th:value="${weekDates[stat.index]}">

                                <div class="inline-edit-top">
                                    <input type="text"
                                           name="title"
                                           th:value="${task.title}"
                                           class="inline-edit-title"
                                           placeholder="Edit task..."
                                           required>

                                    <div class="inline-edit-actions">
                                        <div class="smart-pill edit-date-pill" onclick="openEditDate(this)">
                                            <i class="fa-regular fa-calendar"></i>
                                            <span class="pill-text"></span>
                                            <input type="text"
                                                   name="dueDate"
                                                   th:value="${task.dueDate}"
                                                   class="hidden-flatpickr-input"
                                                   readonly>
                                        </div>

                                        <div class="smart-pill edit-priority-pill">
                                            <i class="fa-solid fa-flag"></i>
                                            <span class="pill-text"></span>
                                            <select name="priority">
                                                <option value=""></option>
                                                <option value="P1" th:selected="${task.priority == 'P1'}">P1</option>
                                                <option value="P2" th:selected="${task.priority == 'P2'}">P2</option>
                                                <option value="P3" th:selected="${task.priority == 'P3'}">P3</option>
                                                <option value="P4" th:selected="${task.priority == 'P4'}">P4</option>
                                            </select>
                                        </div>

                                        <div class="smart-pill edit-category-pill">
                                            <i class="fa-solid fa-tag"></i>
                                            <span class="pill-text"></span>
                                            <select name="category">
                                                <option value=""></option>
                                                <option value="Work" th:selected="${task.category == 'Work'}">Work</option>
                                                <option value="Study" th:selected="${task.category == 'Study'}">Study</option>
                                                <option value="Personal" th:selected="${task.category == 'Personal'}">Personal</option>
                                                <option value="Shopping" th:selected="${task.category == 'Shopping'}">Shopping</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="inline-edit-description-wrap">
                                    <textarea name="description"
                                              class="inline-edit-description"
                                              placeholder="Description..."
                                              th:text="${task.description}"></textarea>
                                </div>

                                <div class="inline-edit-save-row">
                                    <button type="submit" class="small-save-btn">Save</button>
                                </div>
                            </form>
                        </div>

                    </div>
                </div>

                <div th:if="${#lists.isEmpty(entry.value)}" class="empty-text">
                    No tasks for this day
                </div>

                <hr class="section-line">
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    function toggleSidebar() {
        var sidebar = document.getElementById("sidebar");
        var overlay = document.getElementById("overlay");

        if (sidebar.style.transform === "translateX(0%)") {
            sidebar.style.transform = "translateX(-100%)";
            overlay.style.display = "none";
        } else {
            sidebar.style.transform = "translateX(0%)";
            overlay.style.display = "block";
        }
    }

    function toggleDesc(el) {
        var parent = el.parentElement;
        var shortText = parent.querySelector(".desc-short");
        var fullText = parent.querySelector(".desc-full");

        if (fullText.style.display === "inline") {
            fullText.style.display = "none";
            shortText.style.display = "inline";
            el.innerText = "More";
        } else {
            fullText.style.display = "inline";
            shortText.style.display = "none";
            el.innerText = "Less";
        }
    }

    function formatDateForPill(value) {
        if (!value) return "";
        const parts = value.split("-");
        if (parts.length !== 3) return value;
        return parts[2] + "/" + parts[1];
    }

    function updateSmartPill(pill, value) {
        const text = pill.querySelector(".pill-text");
        if (!text) return;

        if (value && value.trim() !== "") {
            text.textContent = value;
            pill.classList.add("active");
        } else {
            text.textContent = "";
            pill.classList.remove("active");
        }
    }

    function closeAllEditInline() {
        document.querySelectorAll(".inline-edit-box").forEach(function(edit) {
            edit.classList.remove("active");
        });

        document.querySelectorAll(".task-row").forEach(function(view) {
            view.style.display = "flex";
        });
    }

    function toggleEditInline(id) {
        var view = document.getElementById("taskView-" + id);
        var edit = document.getElementById("taskEdit-" + id);

        if (!view || !edit) return;

        var isOpen = edit.classList.contains("active");

        closeAllEditInline();

        if (!isOpen) {
            view.style.display = "none";
            edit.classList.add("active");

            var titleInput = edit.querySelector(".inline-edit-title");
            if (titleInput) {
                setTimeout(function () {
                    titleInput.focus();
                    titleInput.select();
                }, 50);
            }
        }
    }

    function openEditDate(el) {
        var input = el.querySelector("input");
        if (!input) return;

        if (!input._flatpickr) {
            flatpickr(input, {
                dateFormat: "Y-m-d",
                allowInput: false,
                clickOpens: false,
                monthSelectorType: "dropdown",
                prevArrow: "&#10094;",
                nextArrow: "&#10095;",
                onChange: function(selectedDates, dateStr) {
                    updateSmartPill(el, formatDateForPill(dateStr));
                }
            });
        }

        input._flatpickr.open();
    }

    function toggleCustomMenu(e, btn) {
        e.stopPropagation();
        var pill = btn.closest(".custom-menu-pill");
        var list = pill.querySelector(".custom-menu-list");
        var wasOpen = pill.classList.contains("open");

        document.querySelectorAll(".custom-menu-pill").forEach(function (p) {
            p.classList.remove("open");
            var l = p.querySelector(".custom-menu-list");
            if (l) l.style.display = "none";
        });

        if (!wasOpen) {
            pill.classList.add("open");
            if (list) list.style.display = "block";
        }
    }

    function chooseCustomOption(e, item, value) {
        e.stopPropagation();
        const pill = item.closest(".custom-menu-pill");
        const input = pill.querySelector("input");
        input.value = value;
        input.dispatchEvent(new Event("change", { bubbles: true }));
        pill.dataset.value = value;
        pill.classList.remove("open");
        const list = pill.querySelector(".custom-menu-list");
        if (list) list.style.display = "none";
        const title = pill.closest("form")?.querySelector(".quick-add-title");
        if (title) title.focus();
    }

    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".day-quick-add").forEach(function(box) {
            const title = box.querySelector(".quick-add-title");
            const description = box.querySelector(".quick-add-description");
            const datePill = box.querySelector(".date-pill");
            const dateInput = box.querySelector(".day-date-input");
            const priorityPill = box.querySelector(".priority-pill");
            const priorityInput = box.querySelector(".day-priority-input");
            const categoryPill = box.querySelector(".category-pill");
            const categoryInput = box.querySelector(".day-category-input");

            if (title) {
                title.addEventListener("focus", function () {
                    box.classList.remove("collapsed");
                    box.classList.add("expanded");
                });

                title.addEventListener("keydown", function (e) {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();

                        if (title.value.trim() === "") {
                            title.reportValidity();
                            return;
                        }

                        box.requestSubmit();
                    }
                });
            }

            if (description) {
                description.addEventListener("focus", function () {
                    box.classList.remove("collapsed");
                    box.classList.add("expanded");
                });
            }

            if (dateInput && datePill) {
                updateSmartPill(datePill, formatDateForPill(dateInput.value));

                var calendarOpen = false;

                var fp = flatpickr(dateInput, {
                    dateFormat: "Y-m-d",
                    allowInput: false,
                    clickOpens: false,
                    monthSelectorType: "dropdown",
                    prevArrow: "&#10094;",
                    nextArrow: "&#10095;",
                    onOpen: function () {
                        calendarOpen = true;
                    },
                    onClose: function () {
                        calendarOpen = false;
                    },
                    onChange: function(selectedDates, dateStr) {
                        updateSmartPill(datePill, formatDateForPill(dateStr));
                    }
                });

                datePill.addEventListener("pointerdown", function (e) {
                    e.preventDefault();
                    e.stopPropagation();

                    if (calendarOpen) {
                        fp.close();
                    } else {
                        fp.open();
                    }
                });
            }

            if (priorityInput && priorityPill) {
                priorityPill.dataset.value = priorityInput.value;
                priorityInput.addEventListener("change", function () {
                    priorityPill.dataset.value = this.value;
                });
            }

            if (categoryInput && categoryPill) {
                categoryPill.dataset.value = categoryInput.value;
                categoryInput.addEventListener("change", function () {
                    categoryPill.dataset.value = this.value;
                });
            }
        });

        document.querySelectorAll(".inline-edit-box").forEach(function(edit) {
            var titleInput = edit.querySelector(".inline-edit-title");
            if (titleInput) {
                titleInput.addEventListener("keydown", function(e) {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();

                        if (titleInput.value.trim() === "") {
                            titleInput.reportValidity();
                            return;
                        }

                        var form = edit.querySelector("form");
                        if (form) {
                            form.requestSubmit();
                        }
                    }
                });
            }
        });

        document.querySelectorAll(".edit-date-pill").forEach(function (pill) {
            const input = pill.querySelector("input");
            if (input) {
                updateSmartPill(pill, formatDateForPill(input.value));
            }
        });

        document.querySelectorAll(".edit-priority-pill").forEach(function (pill) {
            const select = pill.querySelector("select");
            if (select) {
                updateSmartPill(pill, select.value);
                select.addEventListener("change", function () {
                    updateSmartPill(pill, this.value);
                });
            }
        });

        document.querySelectorAll(".edit-category-pill").forEach(function (pill) {
            const select = pill.querySelector("select");
            if (select) {
                updateSmartPill(pill, select.value);
                select.addEventListener("change", function () {
                    updateSmartPill(pill, this.value);
                });
            }
        });

        document.addEventListener("click", function (e) {
            if (!e.target.closest(".custom-menu-pill")) {
                document.querySelectorAll(".custom-menu-pill").forEach(function (pill) {
                    pill.classList.remove("open");
                    const list = pill.querySelector(".custom-menu-list");
                    if (list) list.style.display = "none";
                });
            }

            document.querySelectorAll(".day-quick-add").forEach(function(box) {
                if (!box.contains(e.target)) {
                    box.classList.remove("expanded");
                    box.classList.add("collapsed");
                }
            });

            var clickedEditButton = e.target.closest("[onclick*='toggleEditInline']");
            var clickedEditBox = e.target.closest(".inline-edit-box");

            if (!clickedEditButton && !clickedEditBox) {
                closeAllEditInline();
            }
        });
    });

</script>

</body>
</html>
