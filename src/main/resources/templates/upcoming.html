<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upcoming Tasks</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
            scroll-behavior: smooth;
        }

        .menu-global {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 22px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1500;
            padding: 8px 10px;
            border-radius: 8px;
        }

        .menu-global:hover {
            background: #f5f5f5;
        }

        .page-content {
            flex: 1;
            padding: 30px;
            padding-left: 70px;
            width: 100%;
            box-sizing: border-box;
        }

        .container {
            width: 760px;
            max-width: calc(100% - 20px);
            margin: 20px auto 50px;
        }

        .page-title {
            font-size: 36px;
            text-align: center;
            margin-bottom: 10px;
        }

        .month-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .month-label {
            text-align: center;
            color: gray;
            font-size: 18px;
        }

        .nav-arrow {
            text-decoration: none;
            color: black;
            font-size: 22px;
            padding: 6px 10px;
            border-radius: 8px;
        }

        .nav-arrow:hover {
            background: #f2f2f2;
        }

        .nav-arrow.disabled {
            color: #bdbdbd;
            pointer-events: none;
            cursor: not-allowed;
        }

        .days-bar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }

        .day-box {
            text-align: center;
            padding: 10px 6px;
            border-radius: 10px;
            text-decoration: none;
            color: black;
            border: 1px solid #ddd;
            background: white;
            box-sizing: border-box;
            width: 100%;
        }

        .day-box:hover {
            background: #f7f7f7;
        }

        .day-box.active {
            background: black;
            color: white;
            border: 1px solid black;
        }

        .day-name {
            font-size: 11px;
        }

        .day-number {
            font-size: 16px;
            font-weight: bold;
        }

        .day-section {
            scroll-margin-top: 20px;
        }

        .day-title {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .section-line {
            margin: 22px 0;
            border: none;
            border-top: 1px solid #ddd;
        }

        .empty-text {
            color: gray;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .quick-add-box,
        .inline-edit-box {
            border: 1px solid #e5e5e5;
            border-radius: 14px;
            background: #fff;
            padding: 12px 14px;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .quick-add-box {
            border: none;
            border-bottom: 1px solid #e5e5e5;
            border-radius: 0;
            background: transparent;
            padding: 6px 0;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }
        .quick-add-box.expanded {
            border: 1px solid #e5e5e5;
            border-radius: 14px;
            padding: 12px 14px;
            background: #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }
        .quick-add-box.collapsed {
            padding: 8px 14px;
        }

        .quick-add-box.collapsed .quick-add-description-wrap {
            display: none !important;
        }

        .quick-add-box.collapsed .quick-add-actions {
            display: none;
        }

        .quick-add-box.collapsed .quick-add-title {
            font-size: 15px;
            padding: 2px 0;
        }

        .quick-add-box.expanded .quick-add-actions {
            display: flex;
        }

        .quick-add-box.expanded .quick-add-description-wrap {
            display: block;
        }

        .quick-add-box:focus-within,
        .inline-edit-box:focus-within {
            border-color: #cfcfcf;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }

        .quick-add-top,
        .inline-edit-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quick-add-title,
        .inline-edit-title {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
            color: #111;
            padding: 6px 0;
            font-family: Arial, sans-serif;
        }

        .quick-add-title::placeholder,
        .inline-edit-title::placeholder {
            color: #888;
        }

        .quick-add-actions,
        .inline-edit-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-add-description-wrap,
        .inline-edit-description-wrap {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }

        .quick-add-description-wrap {
            display: none;
        }

        .quick-add-box.expanded .quick-add-description-wrap {
            display: block;
        }

        .quick-add-description,
        .inline-edit-description {
            width: 100%;
            min-height: 44px;
            resize: vertical;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            line-height: 1.5;
            color: #444;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .quick-add-description::placeholder,
        .inline-edit-description::placeholder {
            color: #9a9a9a;
        }

        .hint-text {
            margin-top: 8px;
            font-size: 12px;
            color: #8a8a8a;
        }

        .task-item {
            padding: 14px 0;
            border-bottom: 1px solid #e6e6e6;
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            width: 100%;
        }

        .task-left {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .task-content {
            flex: 1;
            min-width: 0;
            max-width: 520px;
        }

        .task-title {
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 16px;
            line-height: 1.4;
        }

        .task-title.done {
            color: gray;
        }

        .task-title.active {
            font-weight: bold;
            color: #111;
        }

        .task-desc {
            margin-top: 5px;
            line-height: 1.5;
            color: #444;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 14px;
        }

        .task-desc.done {
            color: gray;
        }

        .task-meta-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .priority-label,
        .category-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .priority-label {
            color: #555;
        }

        .category-label {
            color: #888;
        }

        .priority-dot,
        .category-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .task-date {
            font-size: 13px;
            color: #555;
        }

        .task-date.done {
            color: gray;
        }

        .task-checkbox {
            margin-top: 2px;
            width: 17px;
            height: 17px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .desc-short,
        .desc-full {
            display: inline;
        }

        .desc-full {
            display: none;
        }

        .more-btn {
            color: #666;
            cursor: pointer;
            font-size: 13px;
            margin-left: 6px;
            text-decoration: underline;
        }

        .more-btn:hover {
            color: black;
        }

        .task-actions {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
            align-items: flex-start;
            white-space: nowrap;
            padding-top: 2px;
        }

        .task-actions a,
        .task-actions button {
            text-decoration: none;
            font-size: 15px;
            color: black;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
        }

        .task-actions a:hover,
        .task-actions button:hover {
            opacity: 0.75;
        }

        .icon-btn,
        .smart-pill {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #e1e1e1;
            background: #fafafa;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s ease;
            overflow: hidden;
            padding: 0;
        }

        .icon-btn:hover,
        .smart-pill:hover {
            background: #f2f2f2;
        }

        .icon-btn i,
        .smart-pill i {
            font-size: 14px;
            color: #555;
            pointer-events: none;
            flex-shrink: 0;
        }

        .smart-pill .pill-text {
            display: none;
            font-size: 13px;
            color: #444;
            white-space: nowrap;
        }

        .smart-pill.active {
            width: auto;
            min-width: 36px;
            border-radius: 999px;
            justify-content: flex-start;
            padding: 0 12px;
        }

        .smart-pill.active .pill-text {
            display: inline;
        }

        .hidden-flatpickr-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }

        .smart-pill select,
        .smart-pill input {
            position: absolute;
            inset: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            border: none;
        }

        .inline-edit-box {
            display: none;
            width: 100%;
        }

        .inline-edit-box.active {
            display: block;
        }

        .inline-edit-save-row {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
        }

        .small-save-btn {
            border: none;
            background: black;
            color: white;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
        }

        #sidebar a {
            text-decoration: none;
            color: black;
        }

        #sidebar a:hover {
            text-decoration: underline;
        }

        .flatpickr-calendar {
            border: none !important;
            border-radius: 18px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12) !important;
            padding: 10px !important;
            width: 360px !important;
            max-width: 90vw !important;
            font-family: Arial, sans-serif !important;
        }

        .flatpickr-current-month {
            font-size: 16px !important;
            padding-top: 4px !important;
        }

        .flatpickr-current-month .flatpickr-monthDropdown-months,
        .flatpickr-current-month input.cur-year {
            font-size: 16px !important;
            font-weight: 600 !important;
        }

        span.flatpickr-weekday {
            color: #555 !important;
            font-size: 12px !important;
            font-weight: 600 !important;
        }

        .flatpickr-day {
            border-radius: 999px !important;
            font-size: 14px !important;
            height: 42px !important;
            line-height: 42px !important;
            max-width: 42px !important;
        }

        .flatpickr-day.today {
            border: 1px solid #999 !important;
        }

        .flatpickr-day.selected {
            background: #111 !important;
            border-color: #111 !important;
            color: #fff !important;
        }

        .flatpickr-day:hover {
            background: #f2f2f2 !important;
        }

        .flatpickr-prev-month,
        .flatpickr-next-month {
            top: 12px !important;
        }

        @media (max-width: 720px) {
            .quick-add-top,
            .inline-edit-top {
                flex-direction: column;
                align-items: stretch;
            }

            .quick-add-actions,
            .inline-edit-actions {
                justify-content: flex-start;
            }

            .container {
                max-width: 100%;
            }

            .flatpickr-calendar {
                width: 95vw !important;
            }
        }
        .day-card {
            border: 1px solid #e5e5e5;
            border-radius: 18px;
            background: #fff;
            padding: 18px 18px 8px;
            margin-bottom: 22px;
        }

        .day-card .day-title {
            margin-top: 0;
            margin-bottom: 14px;
        }

        .day-card .quick-add-box {
            margin-top: 0;
        }

        .day-card .task-item:last-child {
            border-bottom: none;
        }

        .day-card .empty-text {
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .day-card .section-line {
            display: none;
        }
    </style>
</head>
<body>

<button class="menu-global" onclick="toggleSidebar()">
    <i class="fa-solid fa-bars"></i>
</button>

<div style="display:flex; min-height:100vh; position:relative;">

    <div id="sidebar"
         style="width:220px; background:#f5f5f5; min-height:100vh; padding:20px; box-sizing:border-box; position:fixed; top:0; left:0; transform:translateX(-100%); transition:transform 0.3s ease; z-index:3000;">
        <h3 style="margin-top:45px;">Menu</h3>

        <div style="margin-top:15px;">
            <a href="/today"><i class="fa-solid fa-calendar-day"></i> Today </a>
        </div>
        <div style="margin-top:20px;">
            <a href="/tasks"><i class="fa-solid fa-list"></i> All Tasks</a>
        </div>

        <div style="margin-top:15px;">
            <a href="/priorities"><i class="fa-solid fa-filter"></i> Filter by priority</a>
        </div>

        <div style="margin-top:15px;">
            <a href="/categories"><i class="fa-solid fa-layer-group"></i> Categories</a>
        </div>

        <div style="margin-top:15px;">
            <a href="/upcoming"><i class="fa-solid fa-calendar"></i> Upcoming</a>
        </div>

        <div style="margin-top:15px;">
            <a href="/notes"><i class="fa-solid fa-sticky-note"></i> Notes</a>
        </div>

        <div style="margin-top:15px;">
            <a href="/purchases"><i class="fa-solid fa-cart-shopping"></i> Shopping</a>
        </div>
    </div>

    <div id="overlay"
         onclick="toggleSidebar()"
         style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.2); z-index:2000;"></div>

    <div class="page-content">
        <div class="container">

            <h1 class="page-title">Upcoming</h1>

            <div class="month-row">
                <a th:class="${currentStartDate.equals(today)} ? 'nav-arrow disabled' : 'nav-arrow'"
                   th:href="@{/upcoming(startDate=${prevWeekStart})}">
                    <i class="fa-solid fa-chevron-left"></i>
                </a>

                <div class="month-label" th:text="${monthLabel}"></div>

                <a class="nav-arrow"
                   th:href="@{/upcoming(startDate=${nextWeekStart})}">
                    <i class="fa-solid fa-chevron-right"></i>
                </a>
            </div>

            <div class="days-bar">
                <a th:each="date, stat : ${weekDates}"
                   th:href="'#day-' + ${weekDates[stat.index]}"
                   th:class="${date.equals(today)} ? 'day-box active' : 'day-box'">
                    <div class="day-name"
                         th:text="${#temporals.format(date, 'EEE', T(java.util.Locale).ENGLISH)}">
                    </div>
                    <div class="day-number" th:text="${#temporals.format(date, 'd')}"></div>
                </a>
            </div>

            <div th:each="entry, stat : ${groupedTasks}"
                 th:id="'day-' + ${weekDates[stat.index]}"
                 class="day-section day-card">

                <div th:text="${entry.key}" class="day-title"></div>

                <form th:action="@{/tasks}"
                      th:object="${task}"
                      method="post"
                      class="quick-add-box day-quick-add collapsed">

                    <input type="hidden" name="source" value="upcoming">
                    <input type="hidden" name="startDate" th:value="${currentStartDate}">
                    <input type="hidden" name="targetDate" th:value="${weekDates[stat.index]}">

                    <div class="quick-add-top">
                        <input type="text"
                               th:field="*{title}"
                               placeholder="Add a task..."
                               class="quick-add-title"
                               autocomplete="off"
                               required>

                        <div class="quick-add-actions">
                            <div class="smart-pill date-pill">
                                <i class="fa-regular fa-calendar"></i>
                                <span class="pill-text"></span>
                                <input type="text"
                                       name="dueDate"
                                       th:value="${weekDates[stat.index]}"
                                       class="hidden-flatpickr-input day-date-input"
                                       readonly>
                            </div>

                            <div class="smart-pill priority-pill">
                                <i class="fa-solid fa-flag"></i>
                                <span class="pill-text"></span>
                                <select th:field="*{priority}" class="day-priority-select">
                                    <option value=""></option>
                                    <option value="P1">P1</option>
                                    <option value="P2">P2</option>
                                    <option value="P3">P3</option>
                                    <option value="P4">P4</option>
                                </select>
                            </div>

                            <div class="smart-pill category-pill">
                                <i class="fa-solid fa-tag"></i>
                                <span class="pill-text"></span>
                                <select th:field="*{category}" class="day-category-select">
                                    <option value=""></option>
                                    <option value="Work">Work</option>
                                    <option value="Study">Study</option>
                                    <option value="Personal">Personal</option>
                                    <option value="Shopping">Shopping</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="quick-add-description-wrap">
                        <textarea th:field="*{description}"
                                  placeholder="Description..."
                                  class="quick-add-description"></textarea>
                        <div class="hint-text">Press Enter in title to save</div>
                    </div>
                </form>

                <div th:if="${!#lists.isEmpty(entry.value)}">
                    <div th:each="task : ${entry.value}" class="task-item">

                        <div class="task-row" th:id="'taskView-' + ${task.id}">
                            <div class="task-left">
                                <form th:action="@{/tasks/toggle/{id}(id=${task.id})}" method="post" style="margin:0;">
                                    <input type="hidden" name="source" value="upcoming">
                                    <input type="hidden" name="startDate" th:value="${currentStartDate}">
                                    <input type="hidden" name="targetDate" th:value="${weekDates[stat.index]}">
                                    <input type="checkbox"
                                           class="task-checkbox"
                                           th:checked="${task.done}"
                                           onchange="this.form.submit()">
                                </form>

                                <div class="task-content">
                                    <div th:class="${task.done} ? 'task-title done' : 'task-title active'"
                                         th:text="${task.title}"></div>

                                    <div th:if="${task.description != null and !#strings.isEmpty(task.description)}"
                                         th:class="${task.done} ? 'task-desc done' : 'task-desc'">

                                        <span th:if="${task.description.length() > 90}">
                                            <span class="desc-short"
                                                  th:text="${task.description.substring(0,90)}"></span>...
                                            <span class="more-btn" onclick="toggleDesc(this)">More</span>
                                            <span class="desc-full"
                                                  th:text="${task.description}"></span>
                                        </span>

                                        <span th:if="${task.description.length() <= 90}"
                                              th:text="${task.description}">
                                        </span>
                                    </div>

                                    <div class="task-meta-row">
                                        <div class="priority-label" th:if="${task.priority != null}">
                                            <span class="priority-dot"
                                                  th:style="${
                                                      task.priority == 'P1' ? 'background:red;' :
                                                      (task.priority == 'P2' ? 'background:#ff8800;' :
                                                      (task.priority == 'P3' ? 'background:#f4f128;' :
                                                          'background:gray;'))
                                                  }">
                                            </span>
                                            <span th:text="${task.priority}"></span>
                                        </div>

                                        <div class="category-label" th:if="${task.category != null and !#strings.isEmpty(task.category)}">
                                            <span class="category-dot"
                                                  th:style="${
                                                      task.category == 'Work' ? 'background:#4a90e2;' :
                                                      (task.category == 'Study' ? 'background:#9b59b6;' :
                                                      (task.category == 'Personal' ? 'background:#ff6fa5;' :
                                                      (task.category == 'Shopping' ? 'background:#2ecc71;' :
                                                      'background:#cfcfcf;')))
                                                  }">
                                            </span>
                                            <span th:text="${task.category}"></span>
                                        </div>

                                        <div th:if="${task.dueDate != null}"
                                             th:class="${task.done} ? 'task-date done' : 'task-date'">
                                            <i class="fa-regular fa-calendar"></i>
                                            <span th:text="${task.formattedDueDate}"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="task-actions">
                                <button type="button"
                                        th:style="${task.done} ? 'color:gray; pointer-events:none; cursor:not-allowed;' : 'color:black;'"
                                        th:onclick="'toggleEditInline(' + ${task.id} + ')'">
                                    <i class="fa-solid fa-pen"></i>
                                </button>

                                <a th:href="@{/tasks/delete/{id}(id=${task.id}, priority='Upcoming', source='upcoming', startDate=${currentStartDate})}">
                                    <i class="fa-solid fa-xmark"></i>
                                </a>
                            </div>
                        </div>

                        <div th:id="'taskEdit-' + ${task.id}" class="inline-edit-box">
                            <form th:action="@{/tasks/update/{id}(id=${task.id})}" method="post">
                                <input type="hidden" name="source" value="upcoming">
                                <input type="hidden" name="startDate" th:value="${currentStartDate}">
                                <input type="hidden" name="targetDate" th:value="${weekDates[stat.index]}">

                                <div class="inline-edit-top">
                                    <input type="text"
                                           name="title"
                                           th:value="${task.title}"
                                           class="inline-edit-title"
                                           placeholder="Edit task..."
                                           required>

                                    <div class="inline-edit-actions">
                                        <div class="smart-pill edit-date-pill" onclick="openEditDate(this)">
                                            <i class="fa-regular fa-calendar"></i>
                                            <span class="pill-text"></span>
                                            <input type="text"
                                                   name="dueDate"
                                                   th:value="${task.dueDate}"
                                                   class="hidden-flatpickr-input"
                                                   readonly>
                                        </div>

                                        <div class="smart-pill edit-priority-pill">
                                            <i class="fa-solid fa-flag"></i>
                                            <span class="pill-text"></span>
                                            <select name="priority">
                                                <option value=""></option>
                                                <option value="P1" th:selected="${task.priority == 'P1'}">P1</option>
                                                <option value="P2" th:selected="${task.priority == 'P2'}">P2</option>
                                                <option value="P3" th:selected="${task.priority == 'P3'}">P3</option>
                                                <option value="P4" th:selected="${task.priority == 'P4'}">P4</option>
                                            </select>
                                        </div>

                                        <div class="smart-pill edit-category-pill">
                                            <i class="fa-solid fa-tag"></i>
                                            <span class="pill-text"></span>
                                            <select name="category">
                                                <option value=""></option>
                                                <option value="Work" th:selected="${task.category == 'Work'}">Work</option>
                                                <option value="Study" th:selected="${task.category == 'Study'}">Study</option>
                                                <option value="Personal" th:selected="${task.category == 'Personal'}">Personal</option>
                                                <option value="Shopping" th:selected="${task.category == 'Shopping'}">Shopping</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="inline-edit-description-wrap">
                                    <textarea name="description"
                                              class="inline-edit-description"
                                              placeholder="Description..."
                                              th:text="${task.description}"></textarea>
                                </div>

                                <div class="inline-edit-save-row">
                                    <button type="submit" class="small-save-btn">Save</button>
                                </div>
                            </form>
                        </div>

                    </div>
                </div>

                <div th:if="${#lists.isEmpty(entry.value)}" class="empty-text">
                    No tasks for this day
                </div>

                <hr class="section-line">
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    function toggleSidebar() {
        var sidebar = document.getElementById("sidebar");
        var overlay = document.getElementById("overlay");

        if (sidebar.style.transform === "translateX(0%)") {
            sidebar.style.transform = "translateX(-100%)";
            overlay.style.display = "none";
        } else {
            sidebar.style.transform = "translateX(0%)";
            overlay.style.display = "block";
        }
    }

    function toggleDesc(el) {
        var parent = el.parentElement;
        var shortText = parent.querySelector(".desc-short");
        var fullText = parent.querySelector(".desc-full");

        if (fullText.style.display === "inline") {
            fullText.style.display = "none";
            shortText.style.display = "inline";
            el.innerText = "More";
        } else {
            fullText.style.display = "inline";
            shortText.style.display = "none";
            el.innerText = "Less";
        }
    }

    function formatDateForPill(value) {
        if (!value) return "";
        const parts = value.split("-");
        if (parts.length !== 3) return value;
        return parts[2] + "/" + parts[1];
    }

    function updateSmartPill(pill, value) {
        const text = pill.querySelector(".pill-text");
        if (!text) return;

        if (value && value.trim() !== "") {
            text.textContent = value;
            pill.classList.add("active");
        } else {
            text.textContent = "";
            pill.classList.remove("active");
        }
    }

    function closeAllEditInline() {
        document.querySelectorAll(".inline-edit-box").forEach(function(edit) {
            edit.classList.remove("active");
        });

        document.querySelectorAll(".task-row").forEach(function(view) {
            view.style.display = "flex";
        });
    }

    function toggleEditInline(id) {
        var view = document.getElementById("taskView-" + id);
        var edit = document.getElementById("taskEdit-" + id);

        if (!view || !edit) return;

        var isOpen = edit.classList.contains("active");

        closeAllEditInline();

        if (!isOpen) {
            view.style.display = "none";
            edit.classList.add("active");

            var titleInput = edit.querySelector(".inline-edit-title");
            if (titleInput) {
                setTimeout(function () {
                    titleInput.focus();
                    titleInput.select();
                }, 50);
            }
        }
    }

    function openEditDate(el) {
        var input = el.querySelector("input");
        if (!input) return;

        if (!input._flatpickr) {
            flatpickr(input, {
                dateFormat: "Y-m-d",
                allowInput: false,
                clickOpens: false,
                monthSelectorType: "dropdown",
                prevArrow: "&#10094;",
                nextArrow: "&#10095;",
                onChange: function(selectedDates, dateStr) {
                    updateSmartPill(el, formatDateForPill(dateStr));
                }
            });
        }

        input._flatpickr.open();
    }

    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".day-quick-add").forEach(function(box) {
            const title = box.querySelector(".quick-add-title");
            const description = box.querySelector(".quick-add-description");
            const datePill = box.querySelector(".date-pill");
            const dateInput = box.querySelector(".day-date-input");
            const priorityPill = box.querySelector(".priority-pill");
            const prioritySelect = box.querySelector(".day-priority-select");
            const categoryPill = box.querySelector(".category-pill");
            const categorySelect = box.querySelector(".day-category-select");

            if (title) {
                title.addEventListener("focus", function () {
                    box.classList.remove("collapsed");
                    box.classList.add("expanded");
                });

                title.addEventListener("keydown", function (e) {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();

                        if (title.value.trim() === "") {
                            title.reportValidity();
                            return;
                        }

                        box.requestSubmit();
                    }
                });
            }

            if (description) {
                description.addEventListener("focus", function () {
                    box.classList.remove("collapsed");
                    box.classList.add("expanded");
                });
            }

            if (dateInput && datePill) {
                updateSmartPill(datePill, formatDateForPill(dateInput.value));

                var fp = flatpickr(dateInput, {
                    dateFormat: "Y-m-d",
                    allowInput: false,
                    clickOpens: false,
                    monthSelectorType: "dropdown",
                    prevArrow: "&#10094;",
                    nextArrow: "&#10095;",
                    onChange: function(selectedDates, dateStr) {
                        updateSmartPill(datePill, formatDateForPill(dateStr));
                    }
                });

                datePill.addEventListener("click", function (e) {
                    e.preventDefault();
                    fp.open();
                });
            }

            if (prioritySelect && priorityPill) {
                updateSmartPill(priorityPill, prioritySelect.value);
                prioritySelect.addEventListener("change", function () {
                    updateSmartPill(priorityPill, this.value);
                });
            }

            if (categorySelect && categoryPill) {
                updateSmartPill(categoryPill, categorySelect.value);
                categorySelect.addEventListener("change", function () {
                    updateSmartPill(categoryPill, this.value);
                });
            }
        });

        document.querySelectorAll(".inline-edit-box").forEach(function(edit) {
            var titleInput = edit.querySelector(".inline-edit-title");
            if (titleInput) {
                titleInput.addEventListener("keydown", function(e) {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();

                        if (titleInput.value.trim() === "") {
                            titleInput.reportValidity();
                            return;
                        }

                        var form = edit.querySelector("form");
                        if (form) {
                            form.requestSubmit();
                        }
                    }
                });
            }
        });

        document.querySelectorAll(".edit-date-pill").forEach(function (pill) {
            const input = pill.querySelector("input");
            if (input) {
                updateSmartPill(pill, formatDateForPill(input.value));
            }
        });

        document.querySelectorAll(".edit-priority-pill").forEach(function (pill) {
            const select = pill.querySelector("select");
            if (select) {
                updateSmartPill(pill, select.value);
                select.addEventListener("change", function () {
                    updateSmartPill(pill, this.value);
                });
            }
        });

        document.querySelectorAll(".edit-category-pill").forEach(function (pill) {
            const select = pill.querySelector("select");
            if (select) {
                updateSmartPill(pill, select.value);
                select.addEventListener("change", function () {
                    updateSmartPill(pill, this.value);
                });
            }
        });

        document.addEventListener("click", function (e) {
            document.querySelectorAll(".day-quick-add").forEach(function(box) {
                if (!box.contains(e.target)) {
                    box.classList.remove("expanded");
                    box.classList.add("collapsed");
                }
            });

            var clickedEditButton = e.target.closest("[onclick*='toggleEditInline']");
            var clickedEditBox = e.target.closest(".inline-edit-box");

            if (!clickedEditButton && !clickedEditBox) {
                closeAllEditInline();
            }
        });
    });

</script>

</body>
</html>
