<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <title>Upcoming Tasks</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
            scroll-behavior: smooth;
        }

        .menu-global {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 22px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1500;
            padding: 8px 10px;
            border-radius: 8px;
        }

        .menu-global:hover {
            background: #f5f5f5;
        }

        .container {
            width: 700px;
            max-width: calc(100% - 40px);
            margin: 50px auto;
        }

        .page-title {
            font-size: 36px;
            text-align: center;
            margin-bottom: 10px;
        }

        .month-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .month-label {
            text-align: center;
            color: gray;
            font-size: 18px;
        }

        .nav-arrow {
            text-decoration: none;
            color: black;
            font-size: 22px;
            padding: 6px 10px;
            border-radius: 8px;
        }

        .nav-arrow:hover {
            background: #f2f2f2;
        }

        .nav-arrow.disabled {
            color: #bdbdbd;
            pointer-events: none;
            cursor: not-allowed;
        }

        .days-bar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }

        .day-box {
            text-align: center;
            padding: 10px 6px;
            border-radius: 10px;
            text-decoration: none;
            color: black;
            border: 1px solid #ddd;
            background: white;
            box-sizing: border-box;
            width: 100%;
        }

        .day-box:hover {
            background: #f7f7f7;
        }

        .day-box.active {
            background: black;
            color: white;
            border: 1px solid black;
        }

        .day-name {
            font-size: 11px;
        }

        .day-number {
            font-size: 16px;
            font-weight: bold;
        }

        .day-section {
            scroll-margin-top: 20px;
        }

        .day-title {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .task-item {
            padding: 14px 0;
            border-bottom: 1px solid #e6e6e6;
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            width: 100%;
        }

        .task-left {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .task-content {
            flex: 1;
            min-width: 0;
            max-width: 430px;
        }

        .task-title {
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 16px;
            line-height: 1.4;
        }

        .task-title.done {
            color: gray;
        }

        .task-title.active {
            font-weight: bold;
            color: #111;
        }

        .task-desc {
            margin-top: 5px;
            line-height: 1.5;
            color: #444;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 14px;
        }

        .task-desc.done {
            color: gray;
        }

        .task-meta-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .priority-label,
        .category-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .priority-label {
            color: #555;
        }

        .category-label {
            color: #888;
        }

        .priority-dot,
        .category-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .task-date {
            font-size: 13px;
            color: #555;
        }

        .task-date.done {
            color: gray;
        }

        .task-checkbox {
            margin-top: 2px;
            width: 17px;
            height: 17px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .desc-short,
        .desc-full {
            display: inline;
        }

        .desc-full {
            display: none;
        }

        .more-btn {
            color: #666;
            cursor: pointer;
            font-size: 13px;
            margin-left: 6px;
            text-decoration: underline;
        }

        .more-btn:hover {
            color: black;
        }

        .task-actions {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
            align-items: flex-start;
            white-space: nowrap;
            padding-top: 2px;
        }

        .task-actions a {
            text-decoration: none;
            font-size: 15px;
            color: black;
        }

        .task-actions a:hover {
            opacity: 0.75;
        }

        .empty-text {
            color: gray;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .add-task-link {
            display: inline-block;
            margin-top: 10px;
            color: black;
            text-decoration: none;
            font-weight: 500;
        }

        .add-task-link:hover {
            text-decoration: underline;
        }

        .plus-sign {
            font-weight: bold;
            margin-right: 5px;
        }

        .section-line {
            margin: 22px 0;
            border: none;
            border-top: 1px solid #ddd;
        }

        #sidebar a {
            text-decoration: none;
            color: black;
        }

        #sidebar a:hover {
            text-decoration: underline;
        }

        .page-content {
            flex: 1;
            padding: 30px;
            padding-left: 70px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<button class="menu-global" onclick="toggleSidebar()">
    <i class="fa-solid fa-bars"></i>
</button>

<div style="display:flex; min-height:100vh; position:relative;">

    <div id="sidebar"
         style="width:220px; background:#f5f5f5; min-height:100vh; padding:20px; box-sizing:border-box; position:fixed; top:0; left:0; transform:translateX(-100%); transition:transform 0.3s ease; z-index:3000;">
        <h3 style="margin-top:45px;">Menu</h3>

        <div style="margin-top:20px;">
            <a href="/tasks"><i class="fa-solid fa-list"></i> All Tasks</a>
        </div>

        <div style="margin-top:15px;">
            <a href="/priorities"><i class="fa-solid fa-filter"></i> Filter by priority</a>
        </div>

        <div style="margin-top:15px;">
            <a href="/categories"><i class="fa-solid fa-layer-group"></i> Categories</a>
        </div>

        <div style="margin-top:15px;">
            <a href="/upcoming"><i class="fa-solid fa-calendar"></i> Upcoming</a>
        </div>
    </div>

    <div id="overlay"
         onclick="toggleSidebar()"
         style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.2); z-index:2000;"></div>

    <div class="page-content">
        <div class="container">

            <h1 class="page-title">Upcoming</h1>

            <div class="month-row">
                <a th:class="${currentStartDate.equals(today)} ? 'nav-arrow disabled' : 'nav-arrow'"
                   th:href="@{/upcoming(startDate=${prevWeekStart})}">
                    <i class="fa-solid fa-chevron-left"></i>
                </a>

                <div class="month-label" th:text="${monthLabel}"></div>

                <a class="nav-arrow"
                   th:href="@{/upcoming(startDate=${nextWeekStart})}">
                    <i class="fa-solid fa-chevron-right"></i>
                </a>
            </div>

            <div class="days-bar">
                <a th:each="date, stat : ${weekDates}"
                   th:href="'#day-' + ${weekDates[stat.index]}"
                   th:class="${date.equals(today)} ? 'day-box active' : 'day-box'">

                    <div class="day-name"
                         th:text="${#temporals.format(date, 'EEE')}"></div>

                    <div class="day-number"
                         th:text="${#temporals.format(date, 'd')}"></div>
                </a>
            </div>

            <div th:each="entry, stat : ${groupedTasks}"
                 th:id="'day-' + ${weekDates[stat.index]}"
                 class="day-section">

                <div th:text="${entry.key}" class="day-title"></div>

                <div th:if="${!#lists.isEmpty(entry.value)}">

                    <div th:each="task : ${entry.value}" class="task-item">

                        <div class="task-row">

                            <div class="task-left">

                                <form th:action="@{/tasks/toggle/{id}(id=${task.id})}" method="post" style="margin:0;">
                                    <input type="hidden" name="source" value="upcoming">
                                    <input type="hidden" name="startDate" th:value="${currentStartDate}">
                                    <input type="hidden" name="targetDate" th:value="${weekDates[stat.index]}">
                                    <input type="checkbox"
                                           class="task-checkbox"
                                           th:checked="${task.done}"
                                           onchange="this.form.submit()">
                                </form>

                                <div class="task-content">

                                    <div th:class="${task.done} ? 'task-title done' : 'task-title active'"
                                         th:text="${task.title}">
                                    </div>

                                    <div th:if="${task.description != null and !#strings.isEmpty(task.description)}"
                                         th:class="${task.done} ? 'task-desc done' : 'task-desc'">

                                        <span th:if="${task.description.length() > 90}">
                                            <span class="desc-short"
                                                  th:text="${task.description.substring(0,90)}"></span>...
                                            <span class="more-btn" onclick="toggleDesc(this)">More</span>
                                            <span class="desc-full"
                                                  th:text="${task.description}"></span>
                                        </span>

                                        <span th:if="${task.description.length() <= 90}"
                                              th:text="${task.description}">
                                        </span>

                                    </div>

                                    <div class="task-meta-row">

                                        <div class="priority-label" th:if="${task.priority != null}">
                                            <span class="priority-dot"
                                                  th:style="${
                                                      task.priority == 'P1' ? 'background:red;' :
                                                      (task.priority == 'P2' ? 'background:#ff8800;' :
                                                      (task.priority == 'P3' ? 'background:#f4f128;' :
                                                          'background:gray;'))
                                                  }">
                                            </span>
                                            <span th:text="${task.priority}"></span>
                                        </div>

                                        <div class="category-label" th:if="${task.category != null and !#strings.isEmpty(task.category)}">
                                            <span class="category-dot"
                                                  th:style="${
                                                      task.category == 'Work' ? 'background:#4a90e2;' :
                                                      (task.category == 'Study' ? 'background:#9b59b6;' :
                                                      (task.category == 'Personal' ? 'background:#ff6fa5;' :
                                                      (task.category == 'Shopping' ? 'background:#2ecc71;' :
                                                      'background:#cfcfcf;')))
                                                  }">
                                            </span>
                                            <span th:text="${task.category}"></span>
                                        </div>

                                        <div th:if="${task.dueDate != null}"
                                             th:class="${task.done} ? 'task-date done' : 'task-date'">
                                            <i class="fa-regular fa-calendar"></i>
                                            <span th:text="${task.formattedDueDate}"></span>
                                        </div>

                                    </div>

                                </div>

                            </div>

                            <div class="task-actions">

                                <a th:href="@{/tasks/edit/{id}(id=${task.id}, source='upcoming', startDate=${currentStartDate}, targetDate=${weekDates[stat.index]})}"
                                   th:style="${task.done} ? 'color:gray; pointer-events:none; cursor:not-allowed;' : 'color:black;'">
                                    <i class="fa-solid fa-pen"></i>
                                </a>

                                <a th:href="@{/tasks/delete/{id}(id=${task.id}, priority='Upcoming', source='upcoming', startDate=${currentStartDate})}">
                                    <i class="fa-solid fa-xmark"></i>
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

                <div th:if="${#lists.isEmpty(entry.value)}" class="empty-text">
                    No tasks for this day
                </div>

                <a th:href="@{/tasks/new(
                        dueDate=${weekDates[stat.index]},
                        source='upcoming',
                        startDate=${currentStartDate},
                        targetDate=${weekDates[stat.index]}
                   )}"
                   class="add-task-link">
                    <span class="plus-sign">+</span> Add task
                </a>

                <hr class="section-line">
            </div>

        </div>
    </div>
</div>

<script>
    function toggleSidebar() {
        var sidebar = document.getElementById("sidebar");
        var overlay = document.getElementById("overlay");

        if (sidebar.style.transform === "translateX(0%)") {
            sidebar.style.transform = "translateX(-100%)";
            overlay.style.display = "none";
        } else {
            sidebar.style.transform = "translateX(0%)";
            overlay.style.display = "block";
        }
    }

    function toggleDesc(el) {
        var parent = el.parentElement;
        var shortText = parent.querySelector(".desc-short");
        var fullText = parent.querySelector(".desc-full");

        if (fullText.style.display === "inline") {
            fullText.style.
                display = "none";
            shortText.style.display = "inline";
            el.innerText = "More";
        } else {
            fullText.style.display = "inline";
            shortText.style.display = "none";
            el.innerText = "Less";
        }
    }
</script>

</body>
</html>
