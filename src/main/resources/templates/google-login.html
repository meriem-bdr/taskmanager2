<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-50: #e4ecf6;
            --primary-500: #cbe2ff;
            --primary-700: #003e8f;
            --primary-800: #00285c;
            --primary-900: #cbe2ff;

            --bg: #f5f8ff;
            --surface: #ffffff;
            --border: rgba(12, 108, 233, 0.16);
            --text: #08213f;
            --muted: #64748b;
            --soft-blue: #55b6e8;

            --shadow-soft: 0 16px 42px rgba(0, 62, 143, 0.10);
            --shadow-card: 0 8px 22px rgba(12, 108, 233, 0.06);
        }

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                    radial-gradient(circle at top left, rgba(85, 182, 232, 0.28), transparent 35%),
                    radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.20), transparent 35%),
                    var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        .box {
            width: 430px;
            background: var(--surface);
            padding: 38px;
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-soft);
            text-align: center;
        }

        .google-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: #ffffff;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            color: var(--primary-700);
            font-size: 32px;
        }

        h4 {
            color: #3769a8 !important;
            font-weight: 800;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 28px;
        }

        .custom-input {
            height: 54px;
            background: #f5f8ff;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: 0.2s ease;
        }

        .custom-input:focus-within {
            border-color: rgba(12, 108, 233, 0.48);
            box-shadow: 0 12px 28px rgba(12, 108, 233, 0.13);
            transform: translateY(-1px);
        }

        .custom-input .input-group-text {
            background: transparent;
            border: none;
            color: var(--primary-700);
            padding-left: 18px;
            font-size: 17px;
        }

        .custom-input .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
            color: #001229;
            font-size: 15px;
        }

        .custom-input .form-control::placeholder {
            color: #7d8ca4;
        }

        .custom-input .form-control:focus {
            background: transparent;
            box-shadow: none;
        }

        .btn-custom {
            height: 52px;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            box-shadow: 0 12px 26px rgba(12, 108, 233, 0.24);
            transition: 0.2s ease;
        }

        .btn-custom:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 16px 34px rgba(12, 108, 233, 0.32);
        }

        a {
            color: #3769a8 !important;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
        }

        a:hover {
            color: #234a81 !important;
        }

        .back-link {
            margin-top: 22px;
        }

        @media (max-width: 500px) {
            body {
                padding: 22px;
            }

            .box {
                width: 100%;
                padding: 30px 24px;
            }
        }
    </style>
</head>

<body>

<div class="box">

    <div class="google-icon">
        <i class="bi bi-google"></i>
    </div>

    <h4>Login with Google</h4>
    <p class="subtitle">Choose or enter your email to continue.</p>

    <form id="googleForm">

        <div class="input-group mb-3 custom-input">
            <span class="input-group-text">
                <i class="bi bi-envelope"></i>
            </span>

            <input type="email"
                   id="email"
                   list="emails"
                   class="form-control"
                   placeholder="Enter your email"
                   required>
        </div>

        <datalist id="emails"></datalist>

        <button class="btn btn-custom w-100">Continue</button>
    </form>

    <p class="back-link">
        <a href="/login">
            <i class="bi bi-arrow-left"></i>
            Back to Login
        </a>
    </p>

</div>

<script>
    const emailInput = document.getElementById("email");
    const dataList = document.getElementById("emails");

    let emails = JSON.parse(localStorage.getItem("emails")) || [];

    function updateList() {
        dataList.innerHTML = "";

        emails.forEach(email => {
            let option = document.createElement("option");
            option.value = email;
            dataList.appendChild(option);
        });
    }

    updateList();

    document.getElementById("googleForm").addEventListener("submit", function(e) {
        e.preventDefault();

        let email = emailInput.value.trim();

        if (email !== "" && !emails.includes(email)) {
            emails.push(email);
            localStorage.setItem("emails", JSON.stringify(emails));
        }

        window.location.href = "/tasks";
    });
</script>

</body>
</html>
