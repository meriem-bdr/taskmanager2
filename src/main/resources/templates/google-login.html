<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f8;
        }

        .box {
            width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow:
                    0 0 10px #7c2a49,
                    0 0 25px #7c2a49,
                    0 0 50px #7c2a49;
        }
        .btn-custom{
            background-color:#7c2a49 ;
            color: white;
            border: none;

            box-shadow: 0 0 10px #7c2a49,
            0 0 20px #7c2a49;
        }
        .btn-custom:hover {
            background-color:#7c2a49 ;
            opacity: 0.9;
            color: white;
        }
        a{
            color: #7c2a49;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box text-center">

    <h4 class="mb-3">login with Google</h4>

    <form id="googleForm">

        <!-- EMAIL INPUT WITH SUGGESTIONS -->
        <input type="email" id="email" list="emails" class="form-control mb-3" placeholder="Enter your email" required>
        <datalist id="emails"></datalist>

        <button class="btn btn-custom w-100">Continue</button>

    </form>

    <p class="mt-3">
        <a href="/login">Back to Login</a>
    </p>

</div>

<script>
    const emailInput = document.getElementById("email");
    const dataList = document.getElementById("emails");

    // load emails
    let emails = JSON.parse(localStorage.getItem("emails")) || [];

    // display emails
    function updateList() {
        dataList.innerHTML = "";
        emails.forEach(email => {
            let option = document.createElement("option");
            option.value = email;
            dataList.appendChild(option);
        });
    }

    updateList();

    // on submit
    document.getElementById("googleForm").addEventListener("submit", function(e) {
        e.preventDefault(); // prevent reload

        let email = emailInput.value;

        if (!emails.includes(email)) {
            emails.push(email);
            localStorage.setItem("emails", JSON.stringify(emails));
        }

        // simulate login success
        window.location.href = "/tasks";
    });
</script>

</body>
</html>
