<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary-50: #e4ecf6;
            --primary-100: #bad0ee;
            --primary-200: #8ab4ea;
            --primary-300: #5597ec;
            --primary-400: #1b79f3;
            --primary-500: #2563eb;
            --primary-600: #1d4ed8;
            --primary-700: #003e8f;
            --primary-800: #00285c;
            --primary-900: #001229;

            --secondary-50: #ecf1f9;
            --secondary-100: #d6e3f5;
            --secondary-200: #bed5f4;
            --secondary-300: #a3c7f5;
            --secondary-500: #5a9ef6;

            --bg: #f5f8ff;
            --card: #ffffff;
            --surface-solid: #ffffff;
            --border: rgba(12, 108, 233, 0.16);
            --text: #08213f;
            --muted: #64748b;
            --line: #dbeafe;
            --blue: #2563eb;
            --blue2: #55b6e8;
            --soft-blue: #eaf7ff;
            --danger: #ef4444;
            --shadow: 0 8px 22px rgba(12, 108, 233, 0.06);
            --shadow-soft: 0 16px 42px rgba(0, 62, 143, 0.10);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a { color: inherit; text-decoration: none; }

        .menu-global {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 46px;
            height: 46px;
            font-size: 20px;
            background: #ffffff;
            color: #2563eb;
            border: 1px solid #dbeafe;
            cursor: pointer;
            z-index: 2000;
            padding: 0;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
        }

        .menu-global:hover {
            background: var(--primary-50);
            transform: translateY(-1px);
        }

        #overlay {
            display: none !important;
        }

        #sidebar {
            width: 200px;
            min-height: 100vh;
            padding: 90px 16px 20px;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            left: 0;
            transform: translateX(-200px);
            transition: transform 0.28s ease;
            z-index: 1200;
            background: #cbe2ff !important;
            border-right: 1px solid rgba(0,0,0,0.05);
            box-shadow: none;
        }

        #sidebar h3 {
            display: none;
        }

        .sidebar-label {
            margin: 20px 10px 10px;
            color: #475569;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #1e293b;
            font-size: 15px;
            font-weight: 600;
            padding: 10px 12px;
            border-radius: 14px;
            margin-bottom: 6px;
            transition: 0.2s ease;
        }

        #sidebar a i {
            width: 20px;
            text-align: center;
            color: #2563eb;
        }

        #sidebar a:hover,
        #sidebar a.active {
            background: rgba(255,255,255,0.7);
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            color: #2563eb;
        }

        .page {
            min-height: 100vh;
            padding: 10px 34px 34px 78px;
            transition: 0.3s ease;
        }

        .dashboard {
            max-width: 1180px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 24px;
            align-items: start;
        }

        .main-column {
            min-width: 0;
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 24px;
        }

        .title-block h1 {
            margin: 0;
            font-size: 40px;
            letter-spacing: -1px;
            font-weight: 800;
        }

        .title-block p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 16px;
        }

        .top-actions {
            display: flex;
            gap: 14px;
        }

        .round-btn {
            width: 58px;
            height: 58px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: white;
            color: var(--blue);
            box-shadow: var(--shadow);
            cursor: pointer;
            font-size: 21px;
            transition: 0.2s ease;
        }

        .round-btn:hover {
            background: var(--blue);
            color: white;
            transform: translateY(-2px);
        }

        .add-strip {
            background: white;
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 12px;
            min-height: 66px;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
        }

        .quick-add {
            border: none;
            outline: none;
            flex: 1;
            padding: 0 10px;
            font-size: 18px;
            color: var(--text);
            background: transparent;
        }

        .quick-add::placeholder { color: #8ba0ba; }

        .add-strip-icons {
            display: flex;
            gap: 10px;
        }

        .mini-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: white;
            color: var(--blue);
            cursor: pointer;
            font-size: 17px;
            transition: 0.2s ease;
        }

        .mini-circle:hover {
            background: var(--blue);
            color: white;
        }

        .search-panel {
            display: none;
            background: white;
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 12px;
            margin-bottom: 18px;
            box-shadow: var(--shadow);
            align-items: center;
            gap: 10px;
        }

        .search-panel.show {
            display: flex;
        }

        .search-panel i {
            color: var(--blue);
            font-size: 18px;
            margin-left: 8px;
        }

        .search-panel input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 17px;
            color: var(--text);
            background: transparent;
            padding: 10px;
        }

        .search-panel button {
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: var(--soft-blue);
            color: var(--blue);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-panel button:hover {
            background: var(--blue);
            color: white;
        }

        .tabs {
            display: flex;
            gap: 30px;
            margin: 14px 0 18px;
            color: #48586e;
        }

        .tab {
            border: none;
            background: transparent;
            color: inherit;
            cursor: pointer;
            padding: 0 0 10px;
            font-size: 15px;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #1f6ed4;
            border-bottom-color: #1f6ed4;
            font-weight: 700;
        }

        .notes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }

        .note-card {
            background: white;
            border: 1px solid var(--line);
            border-left: 5px solid var(--blue2);
            border-radius: 18px;
            padding: 18px 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: var(--shadow);
            min-height: 120px;
        }

        .note-checkbox {
            display: none;
        }

        .note-card.pinned .note-checkbox {
            background: var(--blue);
            border-color: var(--blue);
        }

        .note-card.pinned .note-checkbox::after {
            content: "★";
            font-size: 12px;
        }

        .note-body {
            min-width: 0;
        }

        .note-body h3 {
            margin: 0 0 8px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
        }

        .note-body p {
            margin: 0 0 12px;
            color: var(--muted);
            white-space: pre-wrap;
            line-height: 1.45;
            max-height: 60px;
            overflow: hidden;
            cursor: pointer;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            background: var(--soft-blue);
            border: 1px solid #cceeff;
            border-radius: 999px;
            color: #135b8d;
            font-size: 13px;
        }

        .chip .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: #28bde8;
        }

        .note-thumb-grid {
            display: grid;
            grid-template-columns: repeat(2, 56px);
            gap: 6px;
            margin-top: 10px;
        }

        .note-thumb-grid img {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--line);
        }

        .image-note-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 15px;
            border: 1px solid var(--line);
            cursor: pointer;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: auto;
        }

        .card-actions button {
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            cursor: pointer;
            background: #f3f9ff;
            color: var(--blue);
        }

        .card-actions button.delete {
            color: var(--danger);
            background: #fff3f3;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel-card {
            background: white;
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-title {
            padding: 22px 26px;
            background: linear-gradient(180deg, #cde5ff, #dcedff);
            font-size: 25px;
            font-weight: 800;
        }

        .panel-body {
            padding: 24px 26px;
        }

        .bar-chart {
            height: 145px;
            border-top: 1px solid var(--line);
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 12px;
            padding-top: 18px;
        }

        .bar-item {
            text-align: center;
            color: #856b63;
            font-size: 13px;
        }

        .bar {
            width: 28px;
            border-radius: 8px 8px 0 0;
            background: #cfeafa;
            margin: 0 auto 9px;
            min-height: 18px;
        }

        .bar.active { background: #5fbfe9; }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 0;
            font-size: 16px;
        }

        .summary-row strong { color: var(--text); }
        .summary-row.danger { color: #dc2626; }

        .empty-state {
            background: white;
            border: 1px dashed #bcd7f1;
            border-radius: 20px;
            padding: 54px 24px;
            text-align: center;
            color: var(--muted);
            box-shadow: var(--shadow);
        }

        .empty-state i {
            font-size: 64px;
            color: var(--blue);
            margin-bottom: 18px;
        }

        .add-menu,
        .image-choice-menu {
            position: fixed;
            display: none;
            flex-direction: column;
            gap: 12px;
            z-index: 2100;
        }

        .add-menu.show,
        .image-choice-menu.show { display: flex; }

        .add-menu button,
        .image-choice-menu button {
            border: 1px solid var(--line);
            background: white;
            color: var(--blue);
            border-radius: 16px;
            padding: 14px 18px;
            min-width: 155px;
            cursor: pointer;
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 16px;
            font-weight: 700;
            box-shadow: var(--shadow);
            transition: 0.2s ease;
        }

        .add-menu button:hover,
        .image-choice-menu button:hover {
            background: var(--blue);
            color: white;
        }

        .editor,
        .image-editor {
            display: none;
            min-height: 100vh;
            background:
                    radial-gradient(circle at top left, rgba(173, 216, 255, .22), transparent 35%),
                    var(--bg);
            padding: 210px 36px 44px;
        }

        .editor.show,
        .image-editor.show { display: block; }

        .editor-shell {
            max-width: 960px;
            margin: 0 auto;
            background: white;
            border: 1px solid var(--line);
            border-top: 5px solid var(--blue2);
            border-radius: 26px;
            padding: 34px;
            box-shadow: var(--shadow);
        }

        .editor-top {
            position: fixed;
            top: 76px;
            left: 0;
            right: 0;
            height: 86px;
            background:
                    radial-gradient(circle at top left, rgba(173, 216, 255, .22), transparent 35%),
                    var(--bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 36px;
            z-index: 3000;
            border-bottom: 1px solid var(--line);
        }

        .icon-btn {
            border: 1px solid var(--line);
            background: white;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            cursor: pointer;
            color: var(--blue);
            font-size: 21px;
            box-shadow: var(--shadow);
            transition: 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--blue);
            color: white;
            transform: translateY(-2px);
        }

        .editor-page-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            margin-left: 14px;
        }

        .editor-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .editor-actions { display: flex; gap: 14px; }

        .editor input.title-input,
        .image-editor input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 26px;
            color: var(--text);
            background: transparent;
        }

        .editor textarea {
            width: 100%;
            min-height: 360px;
            border: none;
            outline: none;
            resize: none;
            font-size: 24px;
            line-height: 1.65;
            color: var(--text);
            background: transparent;
        }

        .images-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .image-item {
            position: relative;
        }

        .image-item img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: #f9fafb;
        }

        .remove-image {
            position: absolute;
            top: 8px;
            right: 8px;
            border: none;
            background: rgba(0,0,0,.75);
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
        }

        #textPhotoInput,
        #imagePhotoInput,
        #imageCameraInput {
            display: none;
        }

        .camera-modal,
        .delete-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .camera-box {
            width: min(520px, 100%);
            background: white;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .camera-box video {
            width: 100%;
            max-height: 520px;
            background: black;
            display: block;
            object-fit: cover;
        }

        .camera-actions,
        .delete-actions {
            display: flex;
            gap: 10px;
            padding: 14px;
        }

        .camera-actions button,
        .delete-actions button {
            flex: 1;
            border: none;
            border-radius: 14px;
            padding: 13px;
            cursor: pointer;
            font-size: 15px;
        }

        .capture-btn,
        .danger {
            background: var(--blue);
            color: white;
        }

        .danger { background: var(--danger); }

        .close-btn,
        .cancel {
            background: #f4f4f5;
            color: var(--text);
        }

        .delete-box {
            background: white;
            width: 310px;
            border-radius: 22px;
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .delete-box i {
            background: rgba(13, 90, 167, 0.15);
            color: #0d5aa7; /* blue */
        }

        .delete-actions .danger {
            background: #0d5aa7; /* blue */
            color: white;
        }

        .delete-actions .danger:hover {
            background: #084a8c;
        }

        .delete-actions .cancel {
            background: #e6f0fb;
            color: #0d5aa7;
        }

        .delete-actions .cancel:hover {
            background: #d2e6fb;
        }

        .hide { display: none; }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%);
            background: var(--text);
            color: white;
            padding: 13px 18px;
            border-radius: 999px;
            display: none;
            z-index: 5000;
            font-size: 14px;
        }

        @media (max-width: 1000px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .side-panel {
                display: none;
            }
        }

        @media (max-width: 700px) {
            .page { padding: 105px 18px 110px; }
            .top-row { align-items: flex-start; flex-direction: column; }
            .title-block h1 { font-size: 34px; }
            .add-strip { flex-direction: column; align-items: stretch; }
            .add-strip-icons { justify-content: flex-end; }
            .note-card { grid-template-columns: 1fr; }
            .note-checkbox { display: none; }
            .editor input.title-input,
            .image-editor input { font-size: 34px; }
        }


        /* ===== NOTES PAGE MATCH TASKS STYLE ===== */
        .top-row {
            margin-bottom: 8px;
            padding: 4px 0;
        }

        .title-block h1 {
            font-size: 32px;
            line-height: 1;
            letter-spacing: -0.5px;
            color: var(--primary-900);
        }

        .round-btn {
            width: 50px;
            height: 50px;
            border-radius: 18px;
            border: 1px solid rgba(12, 108, 233, 0.16);
            background: rgba(255, 255, 255, 0.88);
            color: var(--primary-800);
            box-shadow: 0 10px 24px rgba(0, 62, 143, 0.08);
            backdrop-filter: blur(10px);
        }

        .round-btn:hover,
        .icon-btn:hover,
        .mini-circle:hover,
        .search-panel button:hover,
        .add-menu button:hover,
        .image-choice-menu button:hover {
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            color: white;
            transform: translateY(-2px);
        }

        .add-strip,
        .search-panel,
        .empty-state,
        .note-card,
        .panel-card,
        .editor-shell {
            border-color: #dbeafe;
            box-shadow: var(--shadow);
        }

        .note-card,
        .editor-shell {
            border-left-color: var(--blue2);
        }

        .tabs {
            gap: 28px;
            margin: 6px 0 18px;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
        }

        .tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .chip {
            background: #eaf7ff;
            border-color: rgba(85, 182, 232, 0.25);
            color: #155e9f;
        }

        .chip .dot,
        .bar.active {
            background: #55b6e8;
        }

        .bar {
            background: #cfe8f7;
        }

        .panel-title {
            background: #cbe2ff;
            color: #0f172a;
        }

        .editor,
        .image-editor,
        .editor-top {
            background: var(--bg);
        }

        body.sidebar-open #sidebar,
        #sidebar[style*="translateX(0%)"] {
            transform: translateX(0) !important;
        }

        body.sidebar-open .page,
        body:has(#sidebar[style*="translateX(0%)"]) .page {
            padding-left: 260px;
        }

        @media (max-width: 1000px) {
            .page {
                padding: 70px 12px 20px 12px !important;
            }

            body.sidebar-open .page,
            body:has(#sidebar[style*="translateX(0%)"]) .page {
                padding-left: 12px !important;
            }
        }
    </style>
</head>

<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<button class="menu-global" onclick="toggleSidebar()" aria-label="Open menu">
    <i class="fa-solid fa-bars"></i>
</button>

<div id="sidebar">
    <div class="sidebar-label">Menu</div>

    <a href="/today">
        <i class="fa-solid fa-calendar-day"></i>
        Today
    </a>
    <a href="/tasks">
        <i class="fa-solid fa-list"></i>
        All Tasks
    </a>
    <a href="/upcoming">
        <i class="fa-solid fa-calendar"></i>
        Upcoming
    </a>

    <div class="sidebar-label">Organize</div>

    <a href="/categories">
        <i class="fa-solid fa-layer-group"></i>
        Categories
    </a>
    <a href="/priorities">
        <i class="fa-solid fa-filter"></i>
        Priorities
    </a>
    <a href="/notes" class="active">
        <i class="fa-solid fa-note-sticky"></i>
        Notes
    </a>
    <a href="/shopping">
        <i class="fa-solid fa-cart-shopping"></i>
        Shopping
    </a>
</div>

<main id="homePage" class="page">
    <section class="dashboard">
        <div class="main-column">
            <div class="top-row">
                <div class="title-block">
                    <h1>Notes</h1>
                </div>

                <div class="top-actions">
                    <button class="round-btn" onclick="searchNotes()" title="Search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <button class="round-btn" onclick="toggleAddMenu()" title="Add">
                        <i class="fa-solid fa-plus"></i>
                    </button>

                </div>
            </div>
            <div id="searchPanel" class="search-panel">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input id="searchInput" type="text" placeholder="Search notes..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oninput="renderNotes()">
                <button onclick="clearSearch()" title="Clear search">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="tabs">
                <button id="tabAll" class="tab active" onclick="setFilter('all')">All Notes (0)</button>
                <button id="tabText" class="tab" onclick="setFilter('text')">Text (0)</button>
                <button id="tabImages" class="tab" onclick="setFilter('image')">Images (0)</button>
                <button id="tabPinned" class="tab" onclick="setFilter('pinned')">⭐ Pinned (0)</button>
            </div>

            <div id="emptyState" class="empty-state"></div>
            <div id="notesList" class="notes-list"></div>
        </div>
    </section>

    <div id="addMenu" class="add-menu">
        <button onclick="chooseText()"><i class="fa-solid fa-pen"></i> Text</button>
        <button onclick="openImageChoices()"><i class="fa-solid fa-image"></i> Image</button>
    </div>

    <div id="imageChoiceMenu" class="image-choice-menu">
        <button onclick="chooseImageNote('photo')"><i class="fa-solid fa-photo-film"></i> Photo</button>
        <button onclick="chooseImageNote('camera')"><i class="fa-solid fa-camera"></i> Camera</button>
    </div>
</main>

<section id="textEditorPage" class="editor">
    <div class="editor-top">
        <div class="editor-left">
            <button class="icon-btn" onclick="saveTextNoteAndBack()" aria-label="Back">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <span class="editor-page-title">Add Text Note</span>
        </div>

        <div class="editor-actions">
            <button class="icon-btn" onclick="document.getElementById('textPhotoInput').click()" title="Add photo">
                <i class="fa-solid fa-image"></i>
            </button>
            <button class="icon-btn" onclick="toggleTextPin()" title="Pin note">
                <i id="textPinIcon" class="fa-regular fa-star"></i>
            </button>
            <button class="icon-btn" onclick="saveTextNoteAndBack()" title="Save note">
                <i class="fa-solid fa-check"></i>
            </button>
        </div>
    </div>

    <div class="editor-shell">
        <input id="textNoteTitle" class="title-input" type="text" placeholder="Note title" autocomplete="off">
        <textarea id="textNoteText" placeholder="Start writing..."></textarea>
        <input id="textPhotoInput" type="file" accept="image/*" multiple onchange="handleTextImage(event)">
        <div id="textImagePreview" class="images-grid"></div>
    </div>
</section>

<section id="imageEditorPage" class="image-editor">
    <div class="editor-top">
        <div class="editor-left">
            <button class="icon-btn" onclick="saveImageNoteAndBack()" aria-label="Back">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <span class="editor-page-title">Add Image Note</span>
        </div>

        <div class="editor-actions">
            <button class="icon-btn" onclick="pickImage('photo')" title="Add photo">
                <i class="fa-solid fa-image"></i>
            </button>
            <button class="icon-btn" onclick="toggleImagePin()" title="Pin image">
                <i id="imagePinIcon" class="fa-regular fa-star"></i>
            </button>
            <button class="icon-btn" onclick="saveImageNoteAndBack()" title="Save image">
                <i class="fa-solid fa-check"></i>
            </button>
        </div>
    </div>

    <div class="editor-shell">
        <input id="imageNoteTitle" type="text" placeholder="Image title" autocomplete="off">
        <input id="imagePhotoInput" type="file" accept="image/*" multiple onchange="handleImageNoteFile(event)">
        <input id="imageCameraInput" type="file" accept="image/*" capture="environment" onchange="handleImageNoteFile(event)">
        <div id="imagePagePreview" class="images-grid"></div>
    </div>
</section>

<div id="cameraModal" class="camera-modal">
    <div class="camera-box">
        <video id="cameraVideo" autoplay playsinline></video>
        <div class="camera-actions">
            <button class="capture-btn" onclick="captureFromCamera()">
                <i class="fa-solid fa-camera"></i> Capture
            </button>
            <button class="close-btn" onclick="closeCamera()">Cancel</button>
        </div>
    </div>
</div>

<div id="deleteModal" class="delete-modal">
    <div class="delete-box">
        <i class="fa-solid fa-trash"></i>
        <h3>Delete note?</h3>
        <p>This note will be removed from your list.</p>
        <div class="delete-actions">
            <button class="danger" onclick="confirmDelete()">Delete</button>
            <button class="cancel" onclick="closeDelete()">Cancel</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let notes = JSON.parse(localStorage.getItem("notes")) || [];
    let editingIndex = null;
    let deleteIndex = null;
    let currentFilter = "all";

    let textPinned = false;
    let textImages = [];

    let imagePinned = false;
    let imageImages = [];
    let cameraStream = null;

    function saveStorage() {
        localStorage.setItem("notes", JSON.stringify(notes));
    }

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 1400);
    }

    function searchNotes() {
        const panel = document.getElementById("searchPanel");
        const input = document.getElementById("searchInput");

        panel.classList.toggle("show");

        if (panel.classList.contains("show")) {
            setTimeout(() => input.focus(), 80);
        } else {
            input.value = "";

            document.addEventListener("click", function(e) {
                const searchPanel = document.getElementById("searchPanel");
                const searchInput = document.getElementById("searchInput");
                const addMenu = document.getElementById("addMenu");
                const imageChoiceMenu = document.getElementById("imageChoiceMenu");
                const searchButton = document.querySelector('button[onclick="searchNotes()"]');
                const addButton = document.querySelector('button[onclick="toggleAddMenu()"]');

                if (
                    searchPanel &&
                    searchPanel.classList.contains("show") &&
                    !searchPanel.contains(e.target) &&
                    searchButton &&
                    !searchButton.contains(e.target)
                ) {
                    searchPanel.classList.remove("show");
                    searchInput.value = "";
                    renderNotes();
                }

                if (
                    addMenu &&
                    addMenu.classList.contains("show") &&
                    !addMenu.contains(e.target) &&
                    addButton &&
                    !addButton.contains(e.target)
                ) {
                    addMenu.classList.remove("show");
                    imageChoiceMenu.classList.remove("show");
                }

                if (
                    imageChoiceMenu &&
                    imageChoiceMenu.classList.contains("show") &&
                    !imageChoiceMenu.contains(e.target) &&
                    !addMenu.contains(e.target) &&
                    addButton &&
                    !addButton.contains(e.target)
                ) {
                    imageChoiceMenu.classList.remove("show");
                }
            });

            renderNotes();
        }
    }

    function clearSearch() {
        const input = document.getElementById("searchInput");
        input.value = "";

        document.addEventListener("click", function(e) {
            const searchPanel = document.getElementById("searchPanel");
            const searchInput = document.getElementById("searchInput");
            const addMenu = document.getElementById("addMenu");
            const imageChoiceMenu = document.getElementById("imageChoiceMenu");
            const searchButton = document.querySelector('button[onclick="searchNotes()"]');
            const addButton = document.querySelector('button[onclick="toggleAddMenu()"]');

            if (
                searchPanel &&
                searchPanel.classList.contains("show") &&
                !searchPanel.contains(e.target) &&
                searchButton &&
                !searchButton.contains(e.target)
            ) {
                searchPanel.classList.remove("show");
                searchInput.value = "";
                renderNotes();
            }

            if (
                addMenu &&
                addMenu.classList.contains("show") &&
                !addMenu.contains(e.target) &&
                addButton &&
                !addButton.contains(e.target)
            ) {
                addMenu.classList.remove("show");
                imageChoiceMenu.classList.remove("show");
            }

            if (
                imageChoiceMenu &&
                imageChoiceMenu.classList.contains("show") &&
                !imageChoiceMenu.contains(e.target) &&
                !addMenu.contains(e.target) &&
                addButton &&
                !addButton.contains(e.target)
            ) {
                imageChoiceMenu.classList.remove("show");
            }
        });

        renderNotes();
        input.focus();
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
        if (filter === "all") document.getElementById("tabAll").classList.add("active");
        if (filter === "text") document.getElementById("tabText").classList.add("active");
        if (filter === "image") document.getElementById("tabImages").classList.add("active");
        if (filter === "pinned") document.getElementById("tabPinned").classList.add("active");

        document.addEventListener("click", function(e) {
            const searchPanel = document.getElementById("searchPanel");
            const searchInput = document.getElementById("searchInput");
            const addMenu = document.getElementById("addMenu");
            const imageChoiceMenu = document.getElementById("imageChoiceMenu");
            const searchButton = document.querySelector('button[onclick="searchNotes()"]');
            const addButton = document.querySelector('button[onclick="toggleAddMenu()"]');

            if (
                searchPanel &&
                searchPanel.classList.contains("show") &&
                !searchPanel.contains(e.target) &&
                searchButton &&
                !searchButton.contains(e.target)
            ) {
                searchPanel.classList.remove("show");
                searchInput.value = "";
                renderNotes();
            }

            if (
                addMenu &&
                addMenu.classList.contains("show") &&
                !addMenu.contains(e.target) &&
                addButton &&
                !addButton.contains(e.target)
            ) {
                addMenu.classList.remove("show");
                imageChoiceMenu.classList.remove("show");
            }

            if (
                imageChoiceMenu &&
                imageChoiceMenu.classList.contains("show") &&
                !imageChoiceMenu.contains(e.target) &&
                !addMenu.contains(e.target) &&
                addButton &&
                !addButton.contains(e.target)
            ) {
                imageChoiceMenu.classList.remove("show");
            }
        });

        renderNotes();
    }

    function toggleSidebar() {
        document.body.classList.toggle("sidebar-open");
    }

    function closeSidebar() {
        document.body.classList.remove("sidebar-open");
    }

    function positionMenuUnderAddButton(menu) {
        const addButton = document.querySelector('button[onclick="toggleAddMenu()"]');
        const rect = addButton.getBoundingClientRect();

        menu.style.top = (rect.bottom + 10) + "px";
        menu.style.left = rect.left + "px";
    }

    function toggleAddMenu() {
        const addMenu = document.getElementById("addMenu");
        const imageChoiceMenu = document.getElementById("imageChoiceMenu");

        imageChoiceMenu.classList.remove("show");

        if (addMenu.classList.contains("show")) {
            addMenu.classList.remove("show");
            return;
        }

        positionMenuUnderAddButton(addMenu);
        addMenu.classList.add("show");
    }

    function closeAddMenu() {
        document.getElementById("addMenu").classList.remove("show");
        document.getElementById("imageChoiceMenu").classList.remove("show");
    }

    function openImageChoices() {
        const addMenu = document.getElementById("addMenu");
        const imageChoiceMenu = document.getElementById("imageChoiceMenu");

        addMenu.classList.remove("show");
        positionMenuUnderAddButton(imageChoiceMenu);
        imageChoiceMenu.classList.add("show");
    }

    function hideHome() {
        document.getElementById("homePage").classList.add("hide");
        document.querySelector(".menu-global").style.visibility = "hidden";
        closeSidebar();
        closeAddMenu();
        window.scrollTo(0, 0);
    }

    function showHome() {
        closeCamera();
        document.getElementById("homePage").classList.remove("hide");
        document.getElementById("textEditorPage").classList.remove("show");
        document.getElementById("imageEditorPage").classList.remove("show");
        document.querySelector(".menu-global").style.visibility = "visible";
        editingIndex = null;

        document.addEventListener("click", function(e) {
            const searchPanel = document.getElementById("searchPanel");
            const searchInput = document.getElementById("searchInput");
            const addMenu = document.getElementById("addMenu");
            const imageChoiceMenu = document.getElementById("imageChoiceMenu");
            const searchButton = document.querySelector('button[onclick="searchNotes()"]');
            const addButton = document.querySelector('button[onclick="toggleAddMenu()"]');

            if (
                searchPanel &&
                searchPanel.classList.contains("show") &&
                !searchPanel.contains(e.target) &&
                searchButton &&
                !searchButton.contains(e.target)
            ) {
                searchPanel.classList.remove("show");
                searchInput.value = "";
                renderNotes();
            }

            if (
                addMenu &&
                addMenu.classList.contains("show") &&
                !addMenu.contains(e.target) &&
                addButton &&
                !addButton.contains(e.target)
            ) {
                addMenu.classList.remove("show");
                imageChoiceMenu.classList.remove("show");
            }

            if (
                imageChoiceMenu &&
                imageChoiceMenu.classList.contains("show") &&
                !imageChoiceMenu.contains(e.target) &&
                !addMenu.contains(e.target) &&
                addButton &&
                !addButton.contains(e.target)
            ) {
                imageChoiceMenu.classList.remove("show");
            }
        });

        renderNotes();
    }

    function chooseText() {
        openTextEditor();
    }

    function openTextEditor(index = null) {
        editingIndex = index;
        hideHome();

        document.getElementById("textEditorPage").classList.add("show");
        document.getElementById("imageEditorPage").classList.remove("show");

        if (index !== null) {
            document.getElementById("textNoteTitle").value = notes[index].title || "";
            document.getElementById("textNoteText").value = notes[index].text || "";
            textImages = notes[index].images || (notes[index].image ? [notes[index].image] : []);
            textPinned = notes[index].pinned || false;
        } else {
            document.getElementById("textNoteTitle").value = "";
            document.getElementById("textNoteText").value = "";
            document.getElementById("textPhotoInput").value = "";
            textImages = [];
            textPinned = false;
        }

        updateTextPinIcon();
        updateTextImagePreview();
        setTimeout(() => document.getElementById("textNoteTitle").focus(), 80);
    }

    function chooseImageNote(source) {
        openImageEditor(null, source);
    }

    function openImageEditor(index = null, source = null) {
        editingIndex = index;
        hideHome();

        document.getElementById("imageEditorPage").classList.add("show");
        document.getElementById("textEditorPage").classList.remove("show");

        if (index !== null) {
            document.getElementById("imageNoteTitle").value = notes[index].title || "";
            imageImages = notes[index].images || (notes[index].image ? [notes[index].image] : []);
            imagePinned = notes[index].pinned || false;
        } else {
            document.getElementById("imageNoteTitle").value = "";
            document.getElementById("imagePhotoInput").value = "";
            document.getElementById("imageCameraInput").value = "";
            imageImages = [];
            imagePinned = false;
        }

        updateImagePinIcon();
        updateImageNotePreview();

        if (source) setTimeout(() => pickImage(source), 150);
    }

    function toggleTextPin() {
        textPinned = !textPinned;
        updateTextPinIcon();
    }

    function toggleImagePin() {
        imagePinned = !imagePinned;
        updateImagePinIcon();
    }

    function updateTextPinIcon() {
        document.getElementById("textPinIcon").className = textPinned ? "fa-solid fa-star" : "fa-regular fa-star";
    }

    function updateImagePinIcon() {
        document.getElementById("imagePinIcon").className = imagePinned ? "fa-solid fa-star" : "fa-regular fa-star";
    }

    function handleTextImage(event) {
        const files = Array.from(event.target.files);
        if (files.length === 0) return;

        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                textImages.push(e.target.result);
                updateTextImagePreview();
            };
            reader.readAsDataURL(file);
        });

        event.target.value = "";
    }

    function updateTextImagePreview() {
        const preview = document.getElementById("textImagePreview");
        preview.innerHTML = "";

        if (textImages.length === 0) {
            preview.style.display = "none";
            return;
        }

        preview.style.display = "grid";

        textImages.forEach((src, index) => {
            const item = document.createElement("div");
            item.className = "image-item";
            item.innerHTML = `
                <button class="remove-image" onclick="removeTextImage(${index})" type="button">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <img src="${src}" alt="Text note image">
            `;
            preview.appendChild(item);
        });
    }

    function removeTextImage(index) {
        textImages.splice(index, 1);
        updateTextImagePreview();
    }

    function pickImage(source) {
        if (source === "camera") {
            openCamera();
        } else {
            document.getElementById("imagePhotoInput").click();
        }
    }

    async function openCamera() {
        const modal = document.getElementById("cameraModal");
        const video = document.getElementById("cameraVideo");

        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { ideal: "environment" } },
                audio: false
            });

            video.srcObject = cameraStream;
            modal.style.display = "flex";
        } catch (error) {
            showToast("Camera not available");
        }
    }

    function closeCamera() {
        const modal = document.getElementById("cameraModal");
        const video = document.getElementById("cameraVideo");

        if (cameraStream) {
            cameraStream.getTracks().forEach(track => track.stop());
            cameraStream = null;
        }

        if (video) video.srcObject = null;
        if (modal) modal.style.display = "none";
    }

    function captureFromCamera() {
        const video = document.getElementById("cameraVideo");

        if (!video.videoWidth || !video.videoHeight) {
            showToast("Camera is loading");
            return;
        }

        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const context = canvas.getContext("2d");
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        imageImages.push(canvas.toDataURL("image/jpeg", 0.9));
        updateImageNotePreview();
        closeCamera();
    }

    function handleImageNoteFile(event) {
        const files = Array.from(event.target.files);
        if (files.length === 0) return;

        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                imageImages.push(e.target.result);
                updateImageNotePreview();
            };
            reader.readAsDataURL(file);
        });

        event.target.value = "";
    }

    function updateImageNotePreview() {
        const preview = document.getElementById("imagePagePreview");
        preview.innerHTML = "";

        if (imageImages.length === 0) {
            preview.style.display = "none";
            return;
        }

        preview.style.display = "grid";

        imageImages.forEach((src, index) => {
            const item = document.createElement("div");
            item.className = "image-item";
            item.innerHTML = `
                <button class="remove-image" onclick="removeImageNoteImage(${index})" type="button">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <img src="${src}" alt="Image note">
            `;
            preview.appendChild(item);
        });
    }

    function removeImageNoteImage(index) {
        imageImages.splice(index, 1);
        updateImageNotePreview();
    }

    function saveTextNoteAndBack() {
        const title = document.getElementById("textNoteTitle").value.trim();
        const text = document.getElementById("textNoteText").value.trim();

        if (title !== "" || text !== "" || textImages.length > 0) {
            const now = new Date();
            const note = {
                type: "text",
                title: title || "Untitled",
                text: text,
                images: textImages,
                pinned: textPinned,
                date: now.toLocaleDateString(),
                updatedAt: now.getTime()
            };

            if (editingIndex !== null) {
                notes[editingIndex] = note;
                showToast("Text note updated");
            } else {
                notes.push(note);
                showToast("Text note added");
            }

            saveStorage();
        }

        showHome();
    }

    function saveImageNoteAndBack() {
        const title = document.getElementById("imageNoteTitle").value.trim();

        if (title !== "" || imageImages.length > 0) {
            const now = new Date();
            const note = {
                type: "image",
                title: title || "Image",
                images: imageImages,
                pinned: imagePinned,
                date: now.toLocaleDateString(),
                updatedAt: now.getTime()
            };

            if (editingIndex !== null) {
                notes[editingIndex] = note;
                showToast("Image note updated");
            } else {
                notes.push(note);
                showToast("Image note added");
            }

            saveStorage();
        }

        showHome();
    }

    function getFilteredNotes() {
        const keyword = document.getElementById("searchInput").value.toLowerCase().trim();

        return notes
            .map((note, index) => ({ ...note, originalIndex: index }))
            .filter(note => {
                const noteType = note.type || "text";

                const typeOk =
                    currentFilter === "all" ||
                    (currentFilter === "text" && noteType === "text") ||
                    (currentFilter === "image" && noteType === "image") ||
                    (currentFilter === "pinned" && note.pinned);

                const keywordOk =
                    (note.title || "").toLowerCase().includes(keyword) ||
                    (note.text || "").toLowerCase().includes(keyword);

                return typeOk && keywordOk;
            });
    }

    function renderTextImages(images, index) {
        if (!images || images.length === 0) return "";

        return `
            <div class="note-thumb-grid" onclick="openTextEditor(${index})">
                ${images.slice(0, 4).map(src => `<img src="${src}" alt="Text note image">`).join("")}
            </div>
        `;
    }

    function renderImageGrid(images, index) {
        if (!images || images.length === 0) return "";

        if (images.length === 1) {
            return `<img class="image-note-preview" onclick="openImageEditor(${index})" src="${images[0]}" alt="Image note">`;
        }

        return `
            <div class="note-thumb-grid" onclick="openImageEditor(${index})">
                ${images.slice(0, 4).map(src => `<img src="${src}" alt="Image note">`).join("")}
            </div>
        `;
    }

    function renderNotes() {
        const notesList = document.getElementById("notesList");
        const emptyState = document.getElementById("emptyState");
        const keyword = document.getElementById("searchInput").value.trim();
        const filtered = getFilteredNotes();

        document.getElementById("tabAll").textContent = `All Notes (${notes.length})`;
        document.getElementById("tabText").textContent = `Text (${notes.filter(n => (n.type || "text") === "text").length})`;
        document.getElementById("tabImages").textContent = `Images (${notes.filter(n => n.type === "image").length})`;
        document.getElementById("tabPinned").textContent = `⭐ Pinned (${notes.filter(n => n.pinned).length})`;

        notesList.innerHTML = "";

        if (filtered.length === 0) {
            emptyState.style.display = "block";
            emptyState.innerHTML = keyword
                ? `<i class="fa-solid fa-magnifying-glass"></i><h2>No notes found</h2><p>Try another word or clear the search box.</p>`
                : `<i class="fa-regular fa-note-sticky"></i><h2>No notes yet</h2><p>Click + and choose Text or Image.</p>`;
            return;
        }

        emptyState.style.display = "none";

        filtered.forEach(note => {
            const card = document.createElement("article");
            const isImage = note.type === "image";
            const images = note.images || (note.image ? [note.image] : []);

            card.className = `note-card ${note.pinned ? "pinned" : ""}`;

            card.innerHTML = `
                <div style="display:flex; justify-content:flex-end; align-items:flex-start; gap:10px;">
                    <div class="card-actions">
                        <button onclick="togglePin(${note.originalIndex})" title="Pin"><i class="${note.pinned ? "fa-solid" : "fa-regular"} fa-star"></i></button>
                        <button onclick="${isImage ? `openImageEditor(${note.originalIndex})` : `openTextEditor(${note.originalIndex})`}" title="Edit"><i class="fa-solid fa-pen"></i></button>
                        <button class="delete" onclick="deleteNote(${note.originalIndex})" title="Delete"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>

                <div class="note-body">
                    <h3 onclick="${isImage ? `openImageEditor(${note.originalIndex})` : `openTextEditor(${note.originalIndex})`}">${escapeHtml(note.title || (isImage ? "Image" : "Untitled"))}</h3>
                    ${!isImage && note.text ? `<p onclick="openTextEditor(${note.originalIndex})">${escapeHtml(note.text)}</p>` : ""}
                    ${isImage ? renderImageGrid(images, note.originalIndex) : renderTextImages(images, note.originalIndex)}
                    <div class="chips">
                        <span class="chip"><span class="dot"></span>${isImage ? "Image" : "Text"}</span>
                        <span class="chip"><i class="fa-regular fa-calendar"></i>${note.date || ""}</span>
                        ${images.length ? `<span class="chip"><i class="fa-solid fa-image"></i>${images.length} photo${images.length > 1 ? "s" : ""}</span>` : ""}
                    </div>
                </div>
            `;

            notesList.appendChild(card);
        });
    }

    function togglePin(index) {
        notes[index].pinned = !notes[index].pinned;
        notes[index].updatedAt = Date.now();
        saveStorage();

        document.addEventListener("click", function(e) {
            const searchPanel = document.getElementById("searchPanel");
            const searchInput = document.getElementById("searchInput");
            const addMenu = document.getElementById("addMenu");
            const imageChoiceMenu = document.getElementById("imageChoiceMenu");
            const searchButton = document.querySelector('button[onclick="searchNotes()"]');
            const addButton = document.querySelector('button[onclick="toggleAddMenu()"]');

            if (
                searchPanel &&
                searchPanel.classList.contains("show") &&
                !searchPanel.contains(e.target) &&
                searchButton &&
                !searchButton.contains(e.target)
            ) {
                searchPanel.classList.remove("show");
                searchInput.value = "";
                renderNotes();
            }

            if (
                addMenu &&
                addMenu.classList.contains("show") &&
                !addMenu.contains(e.target) &&
                addButton &&
                !addButton.contains(e.target)
            ) {
                addMenu.classList.remove("show");
                imageChoiceMenu.classList.remove("show");
            }

            if (
                imageChoiceMenu &&
                imageChoiceMenu.classList.contains("show") &&
                !imageChoiceMenu.contains(e.target) &&
                !addMenu.contains(e.target) &&
                addButton &&
                !addButton.contains(e.target)
            ) {
                imageChoiceMenu.classList.remove("show");
            }
        });

        renderNotes();
    }

    function deleteNote(index) {
        deleteIndex = index;
        document.getElementById("deleteModal").style.display = "flex";
    }

    function closeDelete() {
        deleteIndex = null;
        document.getElementById("deleteModal").style.display = "none";
    }

    function confirmDelete() {
        if (deleteIndex === null) return;

        notes.splice(deleteIndex, 1);
        saveStorage();

        document.addEventListener("click", function(e) {
            const searchPanel = document.getElementById("searchPanel");
            const searchInput = document.getElementById("searchInput");
            const addMenu = document.getElementById("addMenu");
            const imageChoiceMenu = document.getElementById("imageChoiceMenu");
            const searchButton = document.querySelector('button[onclick="searchNotes()"]');
            const addButton = document.querySelector('button[onclick="toggleAddMenu()"]');

            if (
                searchPanel &&
                searchPanel.classList.contains("show") &&
                !searchPanel.contains(e.target) &&
                searchButton &&
                !searchButton.contains(e.target)
            ) {
                searchPanel.classList.remove("show");
                searchInput.value = "";
                renderNotes();
            }

            if (
                addMenu &&
                addMenu.classList.contains("show") &&
                !addMenu.contains(e.target) &&
                addButton &&
                !addButton.contains(e.target)
            ) {
                addMenu.classList.remove("show");
                imageChoiceMenu.classList.remove("show");
            }

            if (
                imageChoiceMenu &&
                imageChoiceMenu.classList.contains("show") &&
                !imageChoiceMenu.contains(e.target) &&
                !addMenu.contains(e.target) &&
                addButton &&
                !addButton.contains(e.target)
            ) {
                imageChoiceMenu.classList.remove("show");
            }
        });

        renderNotes();
        showToast("Note deleted");
        closeDelete();
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }


    document.addEventListener("click", function(e) {
        const searchPanel = document.getElementById("searchPanel");
        const searchInput = document.getElementById("searchInput");
        const addMenu = document.getElementById("addMenu");
        const imageChoiceMenu = document.getElementById("imageChoiceMenu");
        const searchButton = document.querySelector('button[onclick="searchNotes()"]');
        const addButton = document.querySelector('button[onclick="toggleAddMenu()"]');

        if (
            searchPanel &&
            searchPanel.classList.contains("show") &&
            !searchPanel.contains(e.target) &&
            searchButton &&
            !searchButton.contains(e.target)
        ) {
            searchPanel.classList.remove("show");
            searchInput.value = "";
            renderNotes();
        }

        if (
            addMenu &&
            addMenu.classList.contains("show") &&
            !addMenu.contains(e.target) &&
            addButton &&
            !addButton.contains(e.target)
        ) {
            addMenu.classList.remove("show");
            imageChoiceMenu.classList.remove("show");
        }

        if (
            imageChoiceMenu &&
            imageChoiceMenu.classList.contains("show") &&
            !imageChoiceMenu.contains(e.target) &&
            !addMenu.contains(e.target) &&
            addButton &&
            !addButton.contains(e.target)
        ) {
            imageChoiceMenu.classList.remove("show");
        }
    });
    document.addEventListener("click", function (e) {
        const sidebar = document.getElementById("sidebar");
        const menuBtn = document.querySelector(".menu-global");

        if (!sidebar || !menuBtn) return;

        const isClickInsideSidebar = sidebar.contains(e.target);
        const isClickOnMenuBtn = menuBtn.contains(e.target);

        if (!isClickInsideSidebar && !isClickOnMenuBtn) {
            document.body.classList.remove("sidebar-open");
        }
    });

    renderNotes();
</script>
