<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: #f5f5f5;
        }
        .container-box {
            max-width: 900px;
            margin: 80px auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .left, .right {
            padding: 40px;
            width: 50%;
        }
        .right {
            background: #7c2a49;
            color: white;
            text-align: center;
        }
        .custom-input .input-group-text {
            background: white;
            border-right: 1px solid #ddd;
        }

        .custom-input .form-control {
            border-left: none;
        }

        .custom-input {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .custom-input input:focus {
            box-shadow: none;
        }
        .btn-custom {
            background-color: #7c2a49;
            color: white;
            border: none;
            transition: 0.3s;

            /* Glow */
            box-shadow: 0 0 10px #7c2a49,
            0 0 20px #7c2a49;
        }

        .btn-custom:hover {
            background-color: #7c2a49;
            color: white;

            /* Stronger glow on hover */
            box-shadow: 0 0 20px #7c2a49,
            0 0 40px #7c2a49,
            0 0 60px #7c2a49;
        }
        a{
            color: #7c2a49;
            text-decoration: none;
        }
        .container-box {
            max-width: 900px;
            margin: 80px auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            display: flex;

            /* Neon Glow */
            box-shadow:
                    0 0 10px #7c2a49,
                    0 0 25px #7c2a49,
                    0 0 50px #7c2a49;
        }

    </style>
</head>

<body>

<div class="container-box">

    <!-- LEFT (LOGIN FORM) -->
    <div class="left">
        <h3>Login</h3>
        <p style="color:red" th:if="${error}" th:text="${error}"></p>

        <form action="/login" method="post">
            <!-- EMAIL -->
            <div class="input-group mb-3 custom-input">
    <span class="input-group-text">
        <i class="bi bi-envelope"></i>
    </span>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <!-- PASSWORD -->
            <div class="input-group mb-3 custom-input">
    <span class="input-group-text">
        <i class="bi bi-lock"></i>
    </span>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <div class="text-center mt-2">
                <a th:href="@{/reset-password}">Forgot Password?</a>
            </div>

            <button class="btn btn-custom w-100 mt-3">Log In</button>
        </form>

        <div class="text-center mt-3">

            <p class="mb-2">or login with</p>

            <a href="/google-login" class="btn btn-custom">
                <i class="bi bi-google"></i> Google
            </a>

        </div>
    </div>

    <!-- RIGHT (SIGN UP LINK) -->
    <div class="right">
        <br>
        <br>
        <br>
        <h3 class="mb-4" >Welcome Back!</h3>
        <p class="mb-4" >Don't have an account?</p>
        <a href="/signup" class="btn btn-light">Create Account</a>
    </div>

</div>

</body>
</html>
