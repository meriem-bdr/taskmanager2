<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-50: #e4ecf6;
            --primary-500: #2563eb;
            --primary-600: #1d4ed8;
            --primary-700: #003e8f;
            --primary-800: #00285c;
            --primary-900: #001229;

            --bg: #f5f8ff;
            --surface: #ffffff;
            --border: rgba(12, 108, 233, 0.16);
            --text: #08213f;
            --muted: #64748b;
            --soft-blue: #55b6e8;

            --shadow-soft: 0 16px 42px rgba(0, 62, 143, 0.10);
            --shadow-card: 0 8px 22px rgba(12, 108, 233, 0.06);
        }

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                    radial-gradient(circle at top left, rgba(85, 182, 232, 0.28), transparent 35%),
                    radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.20), transparent 35%),
                    var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        .container-box {
            width: 920px;
            min-height: 540px;
            background: var(--surface);
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-soft);
        }

        .left, .right {
            width: 50%;
            padding: 55px 48px;
        }

        .left {
            background: #ffffff;
        }

        .right {
            background: linear-gradient(180deg, var(--primary-900), var(--primary-700));
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top-left-radius: 90px;
            border-bottom-left-radius: 90px;
        }

        h3 {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-900);
        }

        .right h3 {
            color: white;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 30px;
        }

        .custom-input {
            height: 54px;
            background: #f5f8ff;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .custom-input .input-group-text {
            background: transparent;
            border: none;
            color: var(--primary-700);
            padding-left: 18px;
        }

        .custom-input .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
        }

        .custom-input .form-control:focus {
            background: transparent;
            box-shadow: none;
        }

        .btn-custom {
            height: 52px;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            box-shadow: 0 12px 26px rgba(12, 108, 233, 0.24);
            transition: 0.2s;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 34px rgba(12, 108, 233, 0.32);
        }

        /* ✅ GOOGLE BUTTON (same as signup) */
        .google-btn {
            height: 50px;
            border-radius: 16px;
            background: #ffffff;
            color: var(--primary-900);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            font-weight: 800;
        }

        .google-btn:hover {
            background: var(--primary-50);
            color: var(--primary-900);
        }

        a {
            color: var(--primary-600);
            text-decoration: none;
            font-weight: 600;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 13px;
            margin: 24px 0 14px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(12, 108, 233, 0.14);
        }

        .right p {
            color: rgba(255,255,255,0.8);
        }

        .right .btn-light {
            border-radius: 999px;
            padding: 12px 34px;
            font-weight: 800;
        }

        .error-text {
            color: red;
            margin-bottom: 10px;
        }

        @media (max-width: 800px) {
            .container-box {
                flex-direction: column;
                width: 95%;
            }

            .left, .right {
                width: 100%;
            }

            .right {
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

<div class="container-box">

    <!-- LEFT -->
    <div class="left">
        <h3>Login</h3>
        <p class="subtitle">Welcome back to your tasks</p>

        <p class="error-text" th:if="${error}" th:text="${error}"></p>

        <form action="/login" method="post">

            <div class="input-group mb-3 custom-input">
                <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                </span>
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="input-group mb-3 custom-input">
                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <div class="text-end mb-3">
                <a th:href="@{/reset-password}">Forgot Password?</a>
            </div>

            <button class="btn btn-custom w-100">Log In</button>
        </form>

        <div class="divider">or login with</div>

        <!-- ✅ GOOGLE BUTTON FIXED -->
        <a href="/google-login"
           class="btn google-btn w-100 d-flex align-items-center justify-content-center gap-2">
            <i class="bi bi-google"></i>
            Google
        </a>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h3>Welcome Back!</h3>
        <p>Don't have an account?</p>
        <a href="/signup" class="btn btn-light">Create Account</a>
    </div>

</div>

</body>
</html>
