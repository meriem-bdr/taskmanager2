<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-50: #e4ecf6;
            --primary-500: #cbe2ff;
            --primary-600: #1d4ed8;
            --primary-700: #003e8f;
            --primary-800: #00285c;
            --primary-900: #cbe2ff;

            --bg: #f5f8ff;
            --surface: #ffffff;
            --border: rgba(12, 108, 233, 0.16);
            --text: #08213f;
            --muted: #64748b;
            --soft-blue: #55b6e8;

            --shadow-soft: 0 16px 42px rgba(0, 62, 143, 0.10);
        }

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                    radial-gradient(circle at top left, rgba(85, 182, 232, 0.28), transparent 35%),
                    radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.20), transparent 35%),
                    var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container-box {
            width: 920px;
            min-height: 540px;
            background: var(--surface);
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-soft);
        }

        .left, .right {
            width: 50%;
            padding: 55px 48px;
        }

        .left {
            background: white;
        }
        .left h3 {
            color: #3769a8 !important;
        }

        .right {
            background: linear-gradient(180deg, var(--primary-900), var(--primary-700));
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top-left-radius: 90px;
            border-bottom-left-radius: 90px;
        }

        h3 {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-900);
        }

        .right h3 {
            color: white;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 30px;
        }

        .custom-input {
            height: 54px;
            background: #f5f8ff;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .custom-input .input-group-text {
            background: transparent;
            border: none;
            color: var(--primary-700);
        }

        .custom-input .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
        }

        .btn-custom {
            height: 52px;
            border-radius: 16px;
            color: white;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            border: none;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
        }

        .message {
            margin-top: 14px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
        }

        .success {
            background: #e6fffa;
            color: green;
        }

        .error {
            background: #fff1f2;
            color: red;
        }

        .right p {
            color: rgba(255,255,255,0.8);
        }

        .right .btn-light {
            border-radius: 999px;
            padding: 12px 34px;
            font-weight: 800;
            color: #3769a8 !important;
        }

        @media (max-width: 800px) {
            .container-box {
                flex-direction: column;
                width: 95%;
            }

            .left, .right {
                width: 100%;
            }

            .right {
                border-radius: 0;
            }
        }
        .brand-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--primary-500), var(--soft-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            margin: 0 auto 12px;
        }

        .reset-header-center {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container-box">

    <!-- LEFT -->
    <div class="left">
        <div class="reset-header-center">

            <div class="brand-icon">
                <i class="bi bi-shield-lock"></i>
            </div>

            <h3>Reset Password</h3>
            <p class="subtitle">Enter your email and new password</p>

        </div>

        <form th:action="@{/reset-password}" method="post">

            <div class="input-group mb-3 custom-input">
                <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                </span>
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="input-group mb-3 custom-input">
                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" name="newPassword" class="form-control" placeholder="New password" required>
            </div>

            <button class="btn btn-custom w-100 mt-3">Update Password</button>
        </form>

        <p class="message success" th:if="${success}" th:text="${success}"></p>
        <p class="message error" th:if="${error}" th:text="${error}"></p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h3>Forgot your password?</h3>
        <p>No worries, reset it and continue your tasks.</p>

        <!-- ONLY BUTTON (clean) -->
        <a th:href="@{/login}" class="btn btn-light">Back to Login</a>
    </div>

</div>

</body>
</html>
