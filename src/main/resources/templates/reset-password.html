<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: #f5f5f5;
        }

        .container-box {
            max-width: 900px;
            margin: 80px auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            display: flex;


            box-shadow:
                    0 0 10px #7c2a49,
                    0 0 25px #7c2a49,
                    0 0 50px #7c2a49;
        }

        .left, .right {
            padding: 40px;
            width: 50%;
        }

        .right {
            background: #7c2a49;
            color: white;
            text-align: center;
        }

        .custom-input {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .custom-input .input-group-text {
            background: white;
            border-right: 1px solid #ddd;
        }

        .custom-input .form-control {
            border-left: none;
        }

        .custom-input input:focus {
            box-shadow: none;
        }

        /* SAME BUTTON STYLE */
        .btn-custom {
            background-color: #7c2a49;
            color: white;
            border: none;
            transition: 0.3s;

            box-shadow: 0 0 10px #7c2a49,
            0 0 20px #7c2a49;
        }

        .btn-custom:hover {
            background-color: #7c2a49;
            color: white;

            box-shadow: 0 0 20px #7c2a49,
            0 0 40px #7c2a49,
            0 0 60px #7c2a49;
        }

        a{
            color: #7c2a49;
            text-decoration: none;
        }

        .message{
            margin-top: 10px;
            font-size: 14px;
        }

        .success{
            color: green;
        }

        .error{
            color: red;
        }

    </style>
</head>

<body>

<div class="container-box">

    <!-- LEFT (RESET FORM) -->
    <div class="left">
        <h3>Reset Password</h3>

        <form th:action="@{/reset-password}" method="post">

            <!-- EMAIL -->
            <div class="input-group mb-3 custom-input">
                <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                </span>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <!-- NEW PASSWORD -->
            <div class="input-group mb-3 custom-input">
                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" name="newPassword" class="form-control" placeholder="New password" required>
            </div>

            <button class="btn btn-custom w-100 mt-3">Update Password</button>
        </form>

        <p class="message success" th:if="${success}" th:text="${success}"></p>
        <p class="message error" th:if="${error}" th:text="${error}"></p>

        <div class="text-center mt-3">
            <a th:href="@{/login}">Back to Login</a>
        </div>
    </div>

    <!-- RIGHT (INFO PANEL) -->
    <div class="right">
        <br><br><br>
        <h3 class="mb-4">Forgot your password?</h3>
        <p class="mb-4">No worries, you can reset it here.</p>
    </div>

</div>

</body>
</html>
