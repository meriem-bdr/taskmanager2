<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-50: #e4ecf6;
            --primary-500: #2563eb;
            --primary-700: #003e8f;
            --primary-800: #00285c;
            --primary-900: #001229;

            --bg: #f5f8ff;
            --surface: #ffffff;
            --border: rgba(12, 108, 233, 0.16);
            --text: #08213f;
            --muted: #64748b;
            --soft-blue: #55b6e8;

            --shadow-soft: 0 16px 42px rgba(0, 62, 143, 0.10);
            --shadow-card: 0 8px 22px rgba(12, 108, 233, 0.06);
        }

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                    radial-gradient(circle at top left, rgba(85, 182, 232, 0.28), transparent 35%),
                    radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.20), transparent 35%),
                    var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        .container-box {
            width: 920px;
            height: 540px;
            min-height: 540px;
            background: var(--surface);
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-soft);
        }

        .left,
        .right {
            width: 50%;
            padding: 45px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left {
            background: linear-gradient(180deg, var(--primary-900), var(--primary-700));
            color: white;
            text-align: center;
            align-items: center;
            border-top-right-radius: 90px;
            border-bottom-right-radius: 90px;
        }

        .right {
            background: #ffffff;
        }

        .brand-icon {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--primary-500), var(--soft-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 25px;
            margin-bottom: 14px;
            box-shadow: 0 14px 30px rgba(12, 108, 233, 0.24);
        }

        h3 {
            font-size: 30px;
            font-weight: 800;
            color: var(--primary-900);
            margin-bottom: 6px;
        }

        .left h3 {
            color: white;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 22px;
            font-size: 15px;
        }

        .left p {
            color: rgba(255, 255, 255, 0.84);
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .custom-input {
            height: 52px;
            background: #f5f8ff;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: 0.2s ease;
        }

        .custom-input:focus-within {
            border-color: rgba(12, 108, 233, 0.48);
            box-shadow: 0 12px 28px rgba(12, 108, 233, 0.13);
            transform: translateY(-1px);
        }

        .custom-input .input-group-text {
            background: transparent;
            border: none;
            color: var(--primary-700);
            padding-left: 18px;
        }

        .custom-input .form-control {
            border: none;
            background: transparent;
            box-shadow: none;
            color: var(--primary-900);
            font-size: 15px;
        }

        .custom-input .form-control:focus {
            background: transparent;
            box-shadow: none;
        }

        .btn-custom {
            height: 50px;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            box-shadow: 0 12px 26px rgba(12, 108, 233, 0.24);
            transition: 0.2s ease;
        }

        .btn-custom:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 16px 34px rgba(12, 108, 233, 0.32);
        }

        .google-btn {
            height: 48px;
            border-radius: 16px;
            background: #ffffff;
            color: var(--primary-900);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            font-weight: 800;
        }

        .google-btn:hover {
            background: var(--primary-50);
            color: var(--primary-900);
        }

        .left .btn-light {
            border-radius: 999px;
            padding: 12px 34px;
            font-weight: 800;
            color: var(--primary-800);
            border: none;
            box-shadow: 0 12px 30px rgba(0, 18, 41, 0.18);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 13px;
            margin: 18px 0 12px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(12, 108, 233, 0.14);
        }

        @media (max-width: 800px) {
            body {
                padding: 22px;
            }

            .container-box {
                width: 100%;
                height: auto;
                min-height: auto;
                flex-direction: column;
            }

            .left,
            .right {
                width: 100%;
                padding: 38px 26px;
            }

            .left {
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

<div class="container-box">

    <div class="left">
        <h3>Welcome Back!</h3>
        <p>
            Already have an account?<br>
            Login and continue organizing your tasks.
        </p>
        <a href="/login" class="btn btn-light">Log In</a>
    </div>

    <div class="right">
        <div class="brand-icon">
            <i class="bi bi-person-plus"></i>
        </div>

        <h3>Create Account</h3>
        <p class="subtitle">Start organizing your tasks and notes today.</p>

        <form action="/signup" method="post">

            <div class="input-group mb-3 custom-input">
                <span class="input-group-text">
                    <i class="bi bi-person"></i>
                </span>
                <input type="text" class="form-control" placeholder="Enter your name" name="name" required>
            </div>

            <div class="input-group mb-3 custom-input">
                <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                </span>
                <input type="email" class="form-control" placeholder="Enter your email" name="email" required>
            </div>

            <div class="input-group mb-3 custom-input">
                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" class="form-control" placeholder="Create a password" name="password" required>
            </div>

            <button class="btn btn-custom w-100">Create Account</button>
        </form>

        <div class="divider">or sign up with</div>

        <a href="/google-login" class="btn google-btn w-100 d-flex align-items-center justify-content-center gap-2">
            <i class="bi bi-google"></i>
            Google
        </a>
    </div>

</div>

</body>
</html>
